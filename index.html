/* ─── BUBBLE TOOLTIP ─── */
var _tipRaf=null;
function showBubbleTip(evt,chartId,posKey,n,dataStr){
  // throttle via rAF para não causar reflow em cada frame
  if(_tipRaf) return;
  _tipRaf=requestAnimationFrame(function(){
    _tipRaf=null;
    var tip=document.getElementById('tip_'+chartId);
    if(!tip) return;
    var data;
    try{ data=JSON.parse(dataStr); }catch(e){ return; }
    function fmtScore2(r){ if(!r||r<=0) return '—'; return r.toFixed(1); }
    var rows=data.map(function(d){
      return '<div style="display:flex;align-items:center;gap:7px;padding:5px 0;border-bottom:1px solid rgba(255,255,255,0.06)">'
        +'<span style="width:7px;height:7px;border-radius:50%;background:'+d.hex+';flex-shrink:0;display:inline-block"></span>'
        +'<span style="font-size:11px;color:#E2E8F0;flex:1;line-height:1.4;word-break:break-word">'+(d.done?'<s style="opacity:.45">':'')+d.name+(d.done?'</s>':'')+'</span>'
        +'<span style="font-size:9px;font-weight:700;padding:1px 5px;border-radius:4px;background:'+d.hex+'22;color:'+d.hex+';flex-shrink:0;white-space:nowrap;margin-left:4px">'+d.frente+'</span>'
        +'</div>';
    }).join('');
    var esf=data[0]?ESFORCO_PESO_INV(data[0].esf)||String(data[0].esf):'—';
    var res=data[0]?(fmtScore2(data[0].res)):'—';
    tip.innerHTML='<div style="font-size:10px;font-weight:700;color:#7A7F96;text-transform:uppercase;letter-spacing:.06em;margin-bottom:8px;line-height:1.4">'
      +n+' iniciativa'+(n>1?'s':'')+' · Esforço <span style="color:#58A6FF">'+esf+'</span> · Resultado <span style="color:#E3B341">'+res+'</span>'
      +'</div>'+rows;
    // posição sem ler offsetHeight (evita reflow)
    var mx=evt.clientX+16;
    var my=evt.clientY-10;
    if(mx+310>window.innerWidth) mx=evt.clientX-316;
    if(my+300>window.innerHeight) my=window.innerHeight-320;
    tip.style.left=mx+'px';
    tip.style.top=my+'px';
    tip.style.display='block';
  });
}
function hideBubbleTip(chartId){
  if(_tipRaf){ cancelAnimationFrame(_tipRaf); _tipRaf=null; }
  var tip=document.getElementById('tip_'+chartId);
  if(tip) tip.style.display='none';
}
function ESFORCO_PESO_INV(n){
  var m={1:'P',2:'M',3:'G',4:'GG'};
  return m[n]||'';
}

/* ─── CALENDAR ─── */
function renderCalendar(){
  const fids=getFids();
  const byDay={};
  fids.forEach(fid=>{
    const meta=FM[fid];
    getItems(fid).forEach((it,i)=>{
      if(!matchPessoa(it)) return;
      // usar dateStart/dateEnd se disponíveis, senão date legado
      const ds=it.dateStart||it.date;
      const de=it.dateEnd||it.dateStart||it.date;
      if(!ds) return;
      // preencher todos os dias do intervalo
      let cur=new Date(ds+'T00:00:00');
      const end=new Date((de||ds)+'T00:00:00');
      while(cur<=end){
        const key=cur.toISOString().slice(0,10);
        if(!byDay[key]) byDay[key]=[];
        byDay[key].push({...it,_fid:fid,_idx:i,_meta:meta});
        cur.setDate(cur.getDate()+1);
      }
    });
  });
  const MN=['Janeiro','Fevereiro','Março','Abril','Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'];
  const DOW=['Dom','Seg','Ter','Qua','Qui','Sex','Sáb'];
  const today=new Date(),firstDay=new Date(calYear,calMonth,1),lastDay=new Date(calYear,calMonth+1,0);
  const startDow=firstDay.getDay(),totalDays=lastDay.getDate();
  let h=`<div class="cal-nav"><button class="cal-nav-btn" onclick="calPrev()">◀ Anterior</button><div class="cal-nav-title">${MN[calMonth]} ${calYear}</div><button class="cal-nav-btn" onclick="calNext()">Próximo ▶</button></div><div class="cal-grid">`;
  DOW.forEach(d=>h+=`<div class="cal-dow">${d}</div>`);
  for(let i=0;i<startDow;i++) h+=`<div class="cal-day other-month"></div>`;
  for(let d=1;d<=totalDays;d++){
    const ds=calYear+'-'+String(calMonth+1).padStart(2,'0')+'-'+String(d).padStart(2,'0');
    const isToday=today.getFullYear()===calYear&&today.getMonth()===calMonth&&today.getDate()===d;
    const events=byDay[ds]||[];
    h+=`<div class="cal-day ${isToday?'today':''}"><div class="cal-day-num">${d}</div>`;
    events.forEach(ev=>{
      const cls=ev.destaque?'cal-event destaque-ev':'cal-event';
      const prefix=ev.destaque?'⭐ ':'';
      h+=`<div class="${cls}" style="${ev.destaque?'':'background:'+ev._meta.hex+'22;color:'+ev._meta.hex}"  onclick="goToItem('${ev._fid}',${ev._idx})">${prefix}${esc(ev.name)}</div>`;
    });
    h+=`</div>`;
  }
  const totalCells=Math.ceil((startDow+totalDays)/7)*7;
  for(let i=startDow+totalDays;i<totalCells;i++) h+=`<div class="cal-day other-month"></div>`;
  h+=`</div>`;
  const noDate=[];
  fids.forEach(fid=>getItems(fid).filter(it=>!it.dateStart&&!it.date&&!it.done&&matchPessoa(it)).forEach((it,i)=>noDate.push({...it,_fid:fid,_idx:i,_meta:FM[fid]})));
  if(noDate.length){
    h+=`<div style="margin-top:24px"><div class="section-title">⚠️ Sem data prevista (${noDate.length})</div><div style="display:flex;flex-wrap:wrap;gap:6px">`;
    noDate.slice(0,20).forEach(it=>{h+=`<span style="padding:4px 10px;border-radius:8px;font-size:11px;background:${it._meta.hex}22;color:${it._meta.hex};border:1px solid ${it._meta.hex}44;cursor:pointer" onclick="goToItem('${it._fid}',${it._idx})">${esc(it.name)}</span>`;});
    if(noDate.length>20) h+=`<span style="font-size:11px;color:var(--muted);padding:4px 10px">+${noDate.length-20} mais...</span>`;
    h+=`</div></div>`;
  }
  return h;
}

function calPrev(){calMonth--;if(calMonth<0){calMonth=11;calYear--;}render();}
function calNext(){calMonth++;if(calMonth>11){calMonth=0;calYear++;}render();}

  curView='plan'; curPlanView='list';

  setTimeout(()=>{const el=document.getElementById('ic_'+fid+'_'+idx);if(el){el.scrollIntoView({behavior:'smooth',block:'center'});el.classList.add('open');}},100);

  fids.forEach(fid=>{
    const meta=FM[fid];
    getItems(fid).forEach((it,i)=>{
      if(!matchPessoa(it)) return;
      const key=fid+'::'+i;
      iniciativaMap[key]={name:it.name,fid,idx:i,meta,start:it.start};
    });
  });

  /* agrupar todos por iniciativaKey */
  const byIniciativa={};
  todos.forEach(t=>{
    const k=t.iniciativaKey||'__none__';
    if(!byIniciativa[k]) byIniciativa[k]=[];
    byIniciativa[k].push(t);
  });

  const shownKeys=Object.keys(iniciativaMap);
  let h=`<div class="todo-toolbar">
    <button class="todo-show-done ${_todoShowDone?'active':''}" onclick="toggleTodoShowDone()">
      ${_todoShowDone?'👁 Ocultar concluídos':'👁 Mostrar concluídos'}
    </button>
  </div>`;

  /* grupos por iniciativa */
  shownKeys.forEach(key=>{
    const ini=iniciativaMap[key];
    const items=(byIniciativa[key]||[]).filter(t=>_todoShowDone||!t.done);
    const allItems=byIniciativa[key]||[];
    const doneCount=allItems.filter(t=>t.done).length;
    const totalCount=allItems.length;
    if(totalCount===0&&!items.length) return; // não mostrar grupo sem nenhum todo
    const grpId='tdg_'+key.replace(/[^a-z0-9]/gi,'_');
    h+=`<div class="todo-iniciativa-group" id="${grpId}">
      <div class="todo-group-header" onclick="document.getElementById('${grpId}').classList.toggle('collapsed')">
        <div class="todo-group-dot" style="background:${ini.meta.hex}"></div>
        <div class="todo-group-name">${esc(ini.name)}</div>
        <div class="todo-group-meta" style="color:${ini.meta.hex}">${ini.meta.name}</div>
        <div class="todo-group-meta" style="margin-left:8px">${ini.start?ini.start+'/26':''}</div>
        <div class="todo-group-meta" style="margin-left:8px;color:var(--green)">${doneCount}/${totalCount}</div>
        <div class="todo-group-chev">▼</div>
      </div>
      <div class="todo-group-body">`;
    items.sort((a,b)=>(a.done?1:-1)||(((a.pri??999))-(b.pri??999)));
    items.forEach(t=>{
      h+=renderTodoItem(t,key);
    });
    h+=`<div class="todo-add-row">
      <input class="todo-add-name" id="tn_${grpId}" placeholder="Nova tarefa..." onkeydown="if(event.key==='Enter')addTodo('${key}','${grpId}')">
      <input class="todo-add-pri" id="tp_${grpId}" type="number" min="1" max="99" placeholder="Pri">
      <button class="todo-add-btn" onclick="addTodo('${key}','${grpId}')">＋</button>
    </div>
    </div></div>`;
  });

  /* todos sem vínculo */
  const unlinked=(byIniciativa['__none__']||[]).filter(t=>_todoShowDone||!t.done);
  if(unlinked.length||(byIniciativa['__none__']||[]).length>0){
    h+=`<div class="todo-unlinked"><div class="todo-unlinked-title">Sem iniciativa vinculada</div>`;
    unlinked.forEach(t=>{ h+=renderTodoItem(t,'__none__'); });
    h+=`<div class="todo-add-row">
      <input class="todo-add-name" id="tn___none__" placeholder="Nova tarefa sem vínculo..." onkeydown="if(event.key==='Enter')addTodo('__none__','__none__')">
      <input class="todo-add-pri" id="tp___none__" type="number" min="1" max="99" placeholder="Pri">
      <button class="todo-add-btn" onclick="addTodo('__none__','__none__')">＋</button>
    </div></div>`;
  }

  if(h===`<div class="todo-toolbar"><button class="todo-show-done ${_todoShowDone?'active':''}" onclick="toggleTodoShowDone()">${_todoShowDone?'👁 Ocultar concluídos':'👁 Mostrar concluídos'}</button></div>`)
    h+=`<div class="empty">Nenhuma iniciativa com TO-DOs. Adicione a partir do Planejamento ou use os grupos acima.</div>`;

  return h;
}

function renderTodoItem(t,key){
  const pri=t.pri??null;
  const meta=[];
  if(t.mes) meta.push(`<span style="background:var(--blue-d);color:var(--blue);padding:1px 7px;border-radius:8px;font-size:10px;font-weight:600">${t.mes}/26</span>`);
  if(t.date) meta.push(`<span style="background:var(--purple-d);color:var(--purple);padding:1px 7px;border-radius:8px;font-size:10px;font-weight:600">📆 ${fmtDate(t.date)}</span>`);
  const metaHtml=meta.length?`<div style="display:flex;gap:4px;margin-top:4px">${meta.join('')}</div>`:'';
  const descHtml=t.desc?`<div style="font-size:11px;color:var(--muted);margin-top:3px;line-height:1.4">${esc(t.desc)}</div>`:'';
  const todoPriAttr=pri!==null?'data-v="'+pri+'"':'';
  return `<div class="todo-item ${t.done?'done-todo':''}" id="td_${t.id}">
    <div class="todo-cb" onclick="toggleTodo('${t.id}')" style="align-self:flex-start;margin-top:2px">${t.done?'✓':''}</div>
    <div style="flex:1;min-width:0">
      <div class="todo-name">${esc(t.name)}</div>
      ${descHtml}${metaHtml}
    </div>
    <div class="todo-pri" ${todoPriAttr}>${pri!==null?pri:'—'}</div>
    <span class="todo-del" onclick="delTodo('${t.id}')">✕</span>
  </div>`;
}

function toggleTodoShowDone(){_todoShowDone=!_todoShowDone;render();}

function toggleTodo(id){
  const todos=getTodos();
  const t=todos.find(x=>x.id===id);
  if(!t) return;
  t.done=!t.done;
  saveTodos(todos);
  render();
}

function addTodo(iniciativaKey,grpId){
  const nameInp=document.getElementById('tn_'+grpId);
  const priInp=document.getElementById('tp_'+grpId);
  const name=(nameInp?.value||'').trim();
  if(!name) return;
  const pri=parseInt(priInp?.value||'')||null;
  const todos=getTodos();
  todos.push({id:todoId(),name,pri,done:false,iniciativaKey:iniciativaKey==='__none__'?'':iniciativaKey});
  saveTodos(todos);
  if(nameInp) nameInp.value='';
  if(priInp) priInp.value='';
  render();
}

function delTodo(id){
  const todos=getTodos();
  saveTodos(todos.filter(t=>t.id!==id));
  render();
}

function openTodoModal(){
  const sel=document.getElementById('tdIniciativa');
  sel.innerHTML='<option value="">— Sem vínculo —</option>';
  Object.entries(FM).forEach(([fid,meta])=>{
    const items=getItems(fid);
    if(!items.length) return;
    const grp=document.createElement('optgroup');
    grp.label=meta.name;
    items.forEach((it,i)=>{
      const opt=document.createElement('option');
      opt.value=fid+'::'+i;
      opt.textContent=it.name+(it.start?' · '+it.start+'/26':'');
      grp.appendChild(opt);
    });
    sel.appendChild(grp);
  });
  const mesOpts='<option value="">—</option>'+MNAMES.map(m=>`<option>${m}</option>`).join('');
  document.getElementById('tdMes').innerHTML=mesOpts;
  ['tdName','tdDate','tdPri'].forEach(id=>{document.getElementById(id).value='';});
  document.getElementById('tdDesc').value='';
  document.getElementById('modalTodoOverlay').classList.add('open');
  setTimeout(()=>document.getElementById('tdName').focus(),100);
}
function closeTodoModal(){
  document.getElementById('modalTodoOverlay').classList.remove('open');
}
function saveTodoModal(){
  const name=document.getElementById('tdName').value.trim();
  if(!name){ alert('Informe o nome da tarefa.'); return; }
  const iniciativaKey=document.getElementById('tdIniciativa').value;
  const desc=document.getElementById('tdDesc').value.trim();
  const mes=document.getElementById('tdMes').value;
  const date=document.getElementById('tdDate').value;
  const pri=parseInt(document.getElementById('tdPri').value)||null;
  const todos=getTodos();
  todos.push({id:todoId(), name, desc, mes, date, pri, done:false, iniciativaKey:iniciativaKey||''});
  saveTodos(todos);
  closeTodoModal();
  setView('todos');
}

/* ─── MIGRAR CHECKLIST (reordena itens existentes sem perder status) ─── */
function migrateChecklists(){
  const d=load();
  let changed=0;
  Object.keys(d).forEach(k=>{
    if(!k.startsWith('cl_')) return;
    const cl=d[k];
    if(!Array.isArray(cl)) return;
    // mapa nome → item existente (preserva status)
    const map={};
    cl.forEach(c=>{ map[c.name.trim()]=c; });
    // reconstrói na nova ordem canônica
    const reordered=DEFAULT_CL.map(name=>{
      const existing=map[name];
      return existing ? {...existing, name} : {name, status:'none'};
    });
    // itens customizados (fora do DEFAULT_CL) vão pro final
    cl.forEach(c=>{ if(!DEFAULT_CL.includes(c.name.trim())) reordered.push(c); });
    if(JSON.stringify(cl)!==JSON.stringify(reordered)){ d[k]=reordered; changed++; }
  });
  if(changed>0) save(d);
  return changed;
}

/* monta CSV legível com todas as iniciativas */
function buildSheetPayload(filtroMeses, ordenar){
  const MESES_ORDER={Jan:1,Fev:2,Mar:3,Abr:4,Mai:5,Jun:6,Jul:7,Ago:8,Set:9,Out:10,Nov:11,Dez:12};
  const rows=[];

  Object.entries(FM).forEach(([fid,meta])=>{
    getItems(fid).forEach((it,i)=>{
      const mes=it.mes||it.start||'';
      if(filtroMeses && !filtroMeses.includes(mes)) return;
      const res=getRes(fid,i);
      const notes=getNotes(fid,i);
      const resp=normResp(it.resp).join(', ');
      const esf=it.esforco||'';
      const pri=it.pri!=null?(it.pri===0?'! (absoluta)':String(it.pri)):'—';
      const flag=it.flagPriority?'Sim':'';
      const status=it.done?'Entregue':'Em andamento';
      rows.push({
        _mesOrder: MESES_ORDER[mes]||99,
        _frenteOrder: Object.keys(FM).indexOf(fid),
        _mesNome: mes,
        _frenteName: meta.name,
        row:[
          meta.name, it.name||'', resp, mes, esf, pri, flag,
          res.tpv||'', res.tpvReal||'', res.atv||'', res.atvReal||'',
          it.dateStart||'', it.dateEnd||'', notes, status
        ]
      });
    });
  });

  if(ordenar){
    rows.sort((a,b)=> a._mesOrder!==b._mesOrder
      ? a._mesOrder-b._mesOrder
      : a._frenteOrder-b._frenteOrder
    );
  }

  return [
    ['Frente','Iniciativa','Responsáveis','Mês','Esforço','Prioridade','Flag',
     'TPV Projetado','TPV Realizado','Ativação Projetada','Ativação Realizada',
     'Data Início','Data Fim','Notas','Status'],
    ...rows.map(r=>r.row)
  ];
}

function exportDados(){
  const data={};
  for(let i=0;i<localStorage.length;i++){
    const k=localStorage.key(i);
    data[k]=localStorage.getItem(k);
  }
  const json=JSON.stringify(data,null,2);
  const blob=new Blob([json],{type:'application/json'});
  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download='gestao-dados-'+new Date().toISOString().slice(0,10)+'.json';
  a.click();
  URL.revokeObjectURL(a.href);
  showSyncToast('✅ Dados exportados! Leve o .json junto com o .html','ok');
}

function importDados(input){
  const file=input.files[0];
  if(!file) return;
  const reader=new FileReader();
  reader.onload=function(e){
    try{
      const data=JSON.parse(e.target.result);
      const keys=Object.keys(data);
      if(!keys.some(k=>k.startsWith('tiago_v'))){
        if(!confirm('Este arquivo não parece ser um backup deste dashboard. Continuar mesmo assim?')) return;
      }
      keys.forEach(k=>localStorage.setItem(k,data[k]));
      showSyncToast('✅ '+keys.length+' registros importados! Recarregando...','ok');
      setTimeout(()=>location.reload(),1500);
    }catch(err){
      showSyncToast('❌ Arquivo inválido: '+err.message,'error');
    }
  };
  reader.readAsText(file);
  input.value='';
}

function exportCSV(filtroMeses, ordenar){
  const rows=buildSheetPayload(filtroMeses, ordenar!==false);
  const csv=rows.map(r=>r.map(cell=>{
    const s=String(cell||'').replace(/"/g,'""');
    return s.includes(',')||s.includes('\n')||s.includes('"')?`"${s}"`:s;
  }).join(',')).join('\n');

  const blob=new Blob(['\uFEFF'+csv],{type:'text/csv;charset=utf-8'});
  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  const date=new Date().toLocaleDateString('pt-BR').replace(/\//g,'-');
  const sufixo=filtroMeses?filtroMeses.join('-')+'-':'';
  a.download=`planejamento-growth-${sufixo}${date}.csv`;
  a.click();
  URL.revokeObjectURL(a.href);
  showSyncToast('✅ CSV exportado!','ok');
}

/* ─── MONDAY.COM SYNC ─── */
const MONDAY_API = 'https://api.monday.com/v2';
const MONDAY_BOARD_DEFAULT = '18408136350'; // Growth Cards | Operacional

function getMondayToken(){ return localStorage.getItem('monday_token') || ''; }
function setMondayToken(t){ localStorage.setItem('monday_token', t); }
function getMondayBoardId(){ return localStorage.getItem('monday_board_id') || MONDAY_BOARD_DEFAULT; }
function setMondayBoardId(v){ localStorage.setItem('monday_board_id', v); }

/* Status do item que indica "entregue" */
const MONDAY_DONE_STATUS = new Set(['entregue', 'on air', 'em mensuração (dados)', 'em mensuracao (dados)']);
const MONDAY_DONE_GROUPS = new Set(['group_mm29vmkx']);
const MONDAY_CANCELLED_GROUPS = new Set(['group_mm29rmjd']);

/* Extrai text de uma coluna pelo id */
function mcv(colValues, id){
  const c = colValues.find(c => c.id === id);
  return c ? (c.text || '') : '';
}

/* Extrai mês PT-BR a partir de data YYYY-MM-DD */
function dateToMes(dateStr){
  if(!dateStr) return '';
  const m = parseInt((dateStr.split('-')[1] || '0'), 10);
  return m >= 1 && m <= 12 ? MNAMES[m-1] : '';
}

/* Monday item → objeto iniciativa interno do HTML */
function mondayToItem(item){
  const cv = item.column_values;

  // Responsável: "Fulano Silva" → "@Fulano" (primeiro nome)
  const respRaw = mcv(cv, 'person');
  const resp = normResp(
    respRaw.split(',').map(n => n.trim().split(' ')[0]).filter(Boolean).join(',')
  );

  // Prazo: "2026-04-22 - 2026-04-29"
  const prazoText = mcv(cv, 'timerange_mm2dx89g');
  let dateStart = '', dateEnd = '', mes = '';
  if(prazoText && prazoText.includes(' - ')){
    [dateStart, dateEnd] = prazoText.split(' - ').map(s => s.trim());
    mes = dateToMes(dateStart);
  }
  // Fallback: extrair mês do nome do item — padrão "2026/04 | ..." ou "2026/04 - ..."
  if(!mes){
    const m = item.name.match(/^20\d{2}\/(\d{2})/);
    if(m) mes = dateToMes('2026-' + m[1] + '-01');
  }

  // Done: grupo Entregue OU status = entregue/on air/mensuracao
  const statusText = mcv(cv, 'status').toLowerCase().trim();
  const done = MONDAY_DONE_GROUPS.has(item.group.id) ||
               MONDAY_DONE_STATUS.has(statusText);

  // Cancelado
  const cancelled = MONDAY_CANCELLED_GROUPS.has(item.group.id);

  // Red flag
  let flagPriority = false;
  try {
    const rf = cv.find(c => c.id === 'boolean_mm299j5k');
    if(rf && rf.value) flagPriority = JSON.parse(rf.value).checked === true;
  } catch(e){}

  return {
    name:         item.name,
    resp:         resp.length === 1 ? resp[0] : resp,
    mes:          mes,
    start:        mes, // compatibilidade
    end:          mes,
    esforco:      mcv(cv, 'color_mm29grpd').replace('Pendente',''),
    squad:        mcv(cv, 'color_mm29ajg').replace('Pendente',''),
    operacao:     mcv(cv, 'color_mm29gcv0').replace('Pendente',''),
    papel:        mcv(cv, 'color_mm2dseff').replace('Pendente',''),
    tipoTarefa:   mcv(cv, 'color_mm2d4hgb').replace('Pendente',''),
    statusKanban: mcv(cv, 'status') || item.group.title,
    destaque:     false,
    dateStart:    dateStart,
    dateEnd:      dateEnd,
    notes:        '',
    done:         done,
    cancelled:    cancelled,
    flagPriority: flagPriority,
    mondayId:     item.id,
    pri: null, priAuto: false, priManual: false,
  };
}

/* Monday item → resultados (obj1/obj2 = tpv/ativação) */
function mondayToRes(item){
  const cv = item.column_values;
  return {
    tpv:     mcv(cv, 'numeric_mm2dsraf'), // Obj1 Projetado
    tpvReal: mcv(cv, 'numeric_mm29cwdj'), // Obj1 Realizado
    atv:     mcv(cv, 'numeric_mm2d49bq'), // Obj2 Projetado
    atvReal: mcv(cv, 'numeric_mm29fkxf'), // Obj2 Realizado
  };
}

/* Cor padrão por frente (mapeamento visual das frentes do board) */
const MONDAY_FRENTE_COLORS = {
  'aquisição':       '#58A6FF',
  'aquisicao':       '#58A6FF',
  'ativação':        '#3DD68C',
  'ativacao':        '#3DD68C',
  'uso':             '#B48EF7',
  'reativação':      '#E3B341',
  'reativacao':      '#E3B341',
  'pagamentos':      '#FB923C',
  'inf/regulatória': '#F87171',
  'inf/regulatoria': '#F87171',
};

function frenteHex(nome){
  const key = nome.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'');
  return MONDAY_FRENTE_COLORS[key] || HEX_OPTIONS[Object.keys(FM).length % HEX_OPTIONS.length];
}

/* Busca todos os itens do board (paginado) */
async function fetchMondayItems(boardId, token){
  const allItems = [];
  let cursor = null;
  const COLS = '"color_mm29ecaj","color_mm29ajg","person","color_mm29gcv0","color_mm29grpd","timerange_mm2dx89g","boolean_mm299j5k","numeric_mm2dsraf","numeric_mm29cwdj","numeric_mm2d49bq","numeric_mm29fkxf","status","color_mm2d4hgb","color_mm2dseff"';

  for(let page = 0; page < 20; page++){
    const cursorArg = cursor ? `, cursor: "${cursor}"` : '';
    const query = `{ boards(ids: [${boardId}]) { items_page(limit: 100${cursorArg}) { cursor items { id name group { id title } column_values(ids: [${COLS}]) { id text value } } } } }`;

    const res = await fetch(MONDAY_API, {
      method: 'POST',
      headers: { 'Authorization': token, 'Content-Type': 'application/json' },
      body: JSON.stringify({ query }),
    });
    if(!res.ok) throw new Error(`HTTP ${res.status}`);
    const json = await res.json();
    if(json.errors?.length) throw new Error(json.errors.map(e => e.message).join('; '));

    const pg = json.data?.boards?.[0]?.items_page;
    if(!pg) throw new Error('Resposta inesperada da API Monday');
    allItems.push(...(pg.items || []));
    cursor = pg.cursor;
    if(!cursor) break;
  }
  return allItems;
}

/* Processa itens Monday → popula FM + localStorage */
function processMondayItems(items){
  const norm = s => String(s).toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').trim();

  // 1. Agrupar por Frente (color_mm29ecaj)
  const byFrente = {}; // nome frente → [items]
  items.forEach(item => {
    // ignorar cancelados
    if(MONDAY_CANCELLED_GROUPS.has(item.group.id)) return;
    const frente = mcv(item.column_values, 'color_mm29ecaj').replace('Pendente','').trim() || 'Sem Frente';
    if(!byFrente[frente]) byFrente[frente] = [];
    byFrente[frente].push(item);
  });

  // 2. Construir FM preservando cores já definidas
  const nameToFid = {};
  Object.entries(FM).forEach(([fid, m]) => { nameToFid[norm(m.name)] = fid; });

  const newFM = {};
  Object.keys(byFrente).forEach(fname => {
    const key = norm(fname);
    let fid = nameToFid[key];
    if(!fid){
      fid = 'monday_' + fname.toLowerCase().replace(/[^a-z0-9]/g,'_').replace(/_+/g,'_').slice(0,24);
      while(newFM[fid]) fid += '_x';
      const hex = frenteHex(fname);
      newFM[fid] = { name: fname, owner: '', color: `var(--custom-${fid})`, hex };
      injectFrenteColor(fid, hex);
      nameToFid[key] = fid;
    } else {
      newFM[fid] = FM[fid];
    }
  });

  FM = newFM;
  saveFM(FM);

  // 3. Limpar dados anteriores das frentes Monday
  const d = load();
  Object.keys(FM).forEach(fid => {
    delete d[fid];
    Object.keys(d).filter(k => k.startsWith('res_' + fid + '_')).forEach(k => delete d[k]);
  });

  // 4. Inserir itens por frente
  Object.entries(byFrente).forEach(([fname, fitems]) => {
    const fid = nameToFid[norm(fname)];
    if(!fid) return;
    const arr = [];
    fitems.forEach(item => {
      const it = mondayToItem(item);
      if(!it.name) return;
      arr.push(it);
      const res = mondayToRes(item);
      if(res.tpv || res.tpvReal || res.atv || res.atvReal)
        d['res_' + fid + '_' + (arr.length - 1)] = res;
    });
    d[fid] = arr;
  });
  save(d);

  const total = items.filter(i => !MONDAY_CANCELLED_GROUPS.has(i.group.id)).length;
  console.log('%c📋 Monday Sync OK', 'color:#3DD68C;font-weight:bold',
    `| ${total} itens | ${Object.keys(byFrente).length} frentes | board ${getMondayBoardId()}`);
  autoRankAll();
}

/* Sync principal */
async function pullFromMonday(){
  const token = getMondayToken();
  if(!token){ openMondayConfig(); return; }

  const btn = document.getElementById('syncBtn');
  if(btn){ btn.innerHTML = '⟳ Sync...'; btn.disabled = true; }
  showSyncToast('⟳ Sincronizando com Monday...', 'ok');

  try {
    const items = await fetchMondayItems(getMondayBoardId(), token);
    processMondayItems(items);
    render();
    showSyncToast(`✅ ${items.length} itens carregados do Monday!`, 'ok');
  } catch(e){
    console.error('Monday sync error:', e);
    showSyncToast('❌ ' + e.message, 'error');
  } finally {
    if(btn){ btn.innerHTML = '⟳ Monday'; btn.disabled = false; }
  }
}

/* converte linha do Sheets → objeto iniciativa */
/* converte data de qualquer formato para YYYY-MM-DD */
function parseDate(str){
  if(!str) return '';
  str=String(str).trim();
  if(!str) return '';
  const ANO_DEFAULT='2026';
  // já está em YYYY-MM-DD
  if(/^\d{4}-\d{2}-\d{2}$/.test(str)) return str;
  // formato DD/MM/YYYY ou DD/MM/YY
  const br=str.match(/^(\d{1,2})\/(\d{1,2})\/(\d{2,4})$/);
  if(br){
    const d=br[1].padStart(2,'0'), m=br[2].padStart(2,'0');
    let y=br[3]; if(y.length===2) y='20'+y;
    return `${y}-${m}-${d}`;
  }
  // formato DD/MM sem ano — assume ano corrente configurado
  const brShort=str.match(/^(\d{1,2})\/(\d{1,2})$/);
  if(brShort){
    const d=brShort[1].padStart(2,'0'), m=brShort[2].padStart(2,'0');
    return `${ANO_DEFAULT}-${m}-${d}`;
  }
  // formato DD-MM-YYYY
  const br2=str.match(/^(\d{1,2})-(\d{1,2})-(\d{2,4})$/);
  if(br2){
    const d=br2[1].padStart(2,'0'), m=br2[2].padStart(2,'0');
    let y=br2[3]; if(y.length===2) y='20'+y;
    return `${y}-${m}-${d}`;
  }
  // formato DD-MM sem ano
  const br2Short=str.match(/^(\d{1,2})-(\d{1,2})$/);
  if(br2Short){
    const d=br2Short[1].padStart(2,'0'), m=br2Short[2].padStart(2,'0');
    return `${ANO_DEFAULT}-${m}-${d}`;
  }
  // tentar Date.parse como fallback
  try{ const dt=new Date(str); if(!isNaN(dt)) return dt.toISOString().slice(0,10); }catch(e){}
  return '';
}

function rowToItem(row, cm){
  const get=(col,def='')=>row[cm[col]]!=null?String(row[cm[col]]).trim():def;
  const respRaw=get('responsáveis')||get('responsavel')||get('resp');
  // resp: normalizar — separar por vírgula OU por @ quando vem "@A @B" sem vírgula
  const resp=normResp(respRaw);
  const destaqueRaw=get('destaque');
  return {
    name:         get('iniciativa'),
    resp:         resp.length===1?resp[0]:resp,
    mes:          get('mês')||get('mes'),
    esforco:      get('esforço')||get('esforco'),
    squad:        get('squad'),
    destaque:     (function(){var v=get('destaque'); return v==='1'||v.toLowerCase()==='sim'||v.toLowerCase()==='s';})(),
    dateStart:    parseDate(get('data início')||get('data inicio')||get('data_inicio')),
    dateEnd:      parseDate(get('data fim')||get('data_fim')),
    notes:        get('notas'),
    done:         (function(){const v=(get('entregue')||get('status')).trim().toLowerCase();return v.includes('entreg')||v==='1'||v==='sim'||v==='s'||v==='x';})(),
    flagPriority: (function(){var v=(get('flag')||get('prioridade absoluta')||get('flag prioridade')).trim().toLowerCase(); return v==='1'||v==='sim'||v==='s'||v==='x'||v==='yes'||v==='true'||v==='y';})(),
    pri:          null, priAuto:false, priManual:false,
  };
}

/* converte linha → resultados (res_fid_idx) */
function rowToRes(row, cm){
  const get=(col)=>row[cm[col]]!=null?String(row[cm[col]]).trim():'';
  return {
    tpv:     get('tpv projetado')||get('tpv proj'),
    atv:     get('ativação projetada')||get('ativacao projetada')||get('atv proj'),
    tpvReal: get('tpv realizado')||get('tpv real'),
    atvReal: get('ativação realizada')||get('ativacao realizada')||get('atv real'),
  };
}

(function checkIncomingData(){

    setTimeout(()=>window.close(), 800);

})();
