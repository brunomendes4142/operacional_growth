<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Growth Cards | Operacional</title>
<link rel="icon" type="image/x-icon" href="https://picpay.com/favicon.ico">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#0D1117;--bg2:#161B25;--bg3:#1C2333;--bg4:#222C3C;
  --border:rgba(255,255,255,0.08);--border2:rgba(255,255,255,0.14);
  --text:#E8EAF0;--muted:#7A7F96;--muted2:#4A4F65;
  --green:#3DD68C;--green-d:rgba(61,214,140,0.12);
  --blue:#58A6FF;--blue-d:rgba(88,166,255,0.12);
  --purple:#B48EF7;--purple-d:rgba(180,142,247,0.12);
  --yellow:#E3B341;--yellow-d:rgba(227,179,65,0.12);
  --red:#F87171;--red-d:rgba(248,113,113,0.12);
  --orange:#FB923C;--orange-d:rgba(251,146,60,0.12);
  --cyan:#22D3EE;--cyan-d:rgba(34,211,238,0.12);
}
*{margin:0;padding:0;box-sizing:border-box;}
html{scroll-behavior:smooth;}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);-webkit-font-smoothing:antialiased;min-height:100vh;}
.header{background:var(--bg2);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:200;}
.header-top{display:flex;align-items:center;justify-content:space-between;padding:14px 28px;border-bottom:1px solid var(--border);}
.logo{font-size:15px;font-weight:800;background:linear-gradient(135deg,var(--green),var(--blue));-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
.header-date{font-size:11px;color:var(--muted);}
.header-nav{display:flex;align-items:center;padding:0 28px;}
.tri-tab{padding:11px 22px;font-size:13px;font-weight:600;color:var(--muted);border:none;background:none;cursor:pointer;border-bottom:2px solid transparent;transition:all .2s;white-space:nowrap;}
.tri-tab:hover{color:var(--text);}
.tri-tab.active{color:var(--green);border-bottom-color:var(--green);}
.filter-bar{background:var(--bg2);border-bottom:1px solid var(--border);padding:0;}
.fb-row{display:flex;align-items:center;gap:8px;padding:8px 28px;flex-wrap:wrap;}
.fb-row+.fb-row{border-top:1px solid var(--border);}
.fb-label{font-size:10px;font-weight:700;color:var(--muted2);text-transform:uppercase;letter-spacing:.08em;min-width:52px;flex-shrink:0;}
.fb-right{margin-left:auto;}
.fchip{display:inline-flex;align-items:center;gap:5px;padding:5px 13px;border-radius:20px;font-size:12px;font-weight:600;cursor:pointer;border:1px solid var(--border);background:var(--bg3);color:var(--muted);transition:all .15s;white-space:nowrap;}
.fchip:hover{border-color:var(--border2);color:var(--text);}
.fchip.active{border-color:var(--green);background:var(--green-d);color:var(--green);}
.fchip .dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;}
.mchip{padding:5px 13px;border-radius:20px;font-size:12px;font-weight:600;cursor:pointer;border:1px solid var(--border);background:var(--bg3);color:var(--muted);transition:all .15s;white-space:nowrap;}
.mchip:hover{border-color:var(--border2);color:var(--text);}
.mchip.active{border-color:var(--green);background:var(--green-d);color:var(--green);}
.mchip.mactive{border-color:var(--text);background:var(--bg4);color:var(--text);font-weight:800;}
.pchip{display:inline-flex;align-items:center;gap:5px;padding:5px 12px;border-radius:20px;font-size:12px;font-weight:600;cursor:pointer;border:1px solid var(--border);background:var(--bg3);color:var(--muted);transition:all .15s;white-space:nowrap;}
.pchip:hover{border-color:var(--border2);color:var(--text);}
.pchip.active{border-color:var(--blue);background:var(--blue-d);color:var(--blue);}
.pchip .pavatar{width:18px;height:18px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:800;color:#fff;flex-shrink:0;}
/* multi-select dropdown */
.ms-wrap{position:relative;display:inline-block;}
.ms-btn{display:inline-flex;align-items:center;gap:7px;padding:5px 12px;border-radius:20px;font-size:12px;font-weight:600;cursor:pointer;border:1px solid var(--border);background:var(--bg3);color:var(--muted);transition:all .15s;white-space:nowrap;user-select:none;}
.ms-btn:hover{border-color:var(--border2);color:var(--text);}
.ms-btn.has-sel{border-color:var(--blue);background:var(--blue-d);color:var(--blue);}
.ms-badge{background:var(--blue);color:#000;border-radius:10px;font-size:10px;font-weight:800;padding:0 5px;min-width:16px;text-align:center;}
.ms-drop{display:none;position:absolute;top:calc(100% + 6px);left:0;z-index:500;background:var(--bg2);border:1px solid var(--border2);border-radius:12px;padding:6px;min-width:190px;max-height:280px;overflow-y:auto;box-shadow:0 8px 24px rgba(0,0,0,.5);}
.ms-wrap.open .ms-drop{display:block;}
.ms-item{display:flex;align-items:center;gap:8px;padding:6px 10px;border-radius:8px;cursor:pointer;font-size:12px;font-weight:500;color:var(--muted);transition:background .1s;}
.ms-item:hover{background:var(--bg3);color:var(--text);}
.ms-item.checked{color:var(--text);}
.ms-check{width:14px;height:14px;border-radius:4px;border:1px solid var(--border2);flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:9px;}
.ms-item.checked .ms-check{background:var(--blue);border-color:var(--blue);color:#000;}
.ms-sep{height:1px;background:var(--border);margin:4px 0;}
.add-btn{display:inline-flex;align-items:center;gap:6px;padding:7px 16px;border-radius:10px;background:var(--green-d);border:1px solid var(--green);color:var(--green);font-size:12px;font-weight:700;cursor:pointer;transition:all .15s;}
.add-btn:hover{background:var(--green);color:#000;}
.add-btn-sec{display:inline-flex;align-items:center;gap:6px;padding:7px 16px;border-radius:10px;background:var(--blue-d);border:1px solid var(--blue);color:var(--blue);font-size:12px;font-weight:700;cursor:pointer;transition:all .15s;}
.add-btn-sec:hover{background:var(--blue);color:#000;}
.add-btns{display:flex;align-items:center;gap:8px;margin-left:auto;}
.sync-group{display:flex;align-items:center;gap:6px;margin-left:12px;}
.sync-btn{display:inline-flex;align-items:center;gap:5px;padding:6px 13px;border-radius:10px;border:1px solid var(--border2);background:var(--bg3);color:var(--muted);font-size:11px;font-weight:700;cursor:pointer;transition:all .15s;white-space:nowrap;}
.sync-btn:hover{border-color:var(--blue);color:var(--blue);}
.sync-btn:disabled{opacity:.5;cursor:not-allowed;}
.sync-cfg{padding:6px 10px;border-radius:10px;border:1px solid var(--border);background:var(--bg3);color:var(--muted2);font-size:11px;cursor:pointer;transition:all .15s;}
.sync-cfg:hover{border-color:var(--border2);color:var(--muted);}
.main{padding:24px 28px;max-width:1100px;margin:0 auto;}
.kpi-row{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:12px;margin-bottom:24px;}
.kpi{background:var(--bg2);border:1px solid var(--border);border-radius:14px;padding:18px 20px;}
.kpi-val{font-size:28px;font-weight:800;line-height:1;}
.kpi-lbl{font-size:11px;color:var(--muted);margin-top:6px;font-weight:500;}
.frente-cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:12px;}
.fc{background:var(--bg2);border:1px solid var(--border);border-radius:14px;padding:18px 20px;}
.fc-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;}
.fc-name{font-size:13px;font-weight:700;}
.fc-count{font-size:11px;color:var(--muted);}
.fc-bar{height:6px;background:var(--bg4);border-radius:3px;overflow:hidden;margin-bottom:8px;}
.fc-fill{height:100%;border-radius:3px;}
.fc-pct{font-size:11px;color:var(--muted);}
.month-group{margin-bottom:20px;border:1px solid var(--border);border-radius:14px;overflow:hidden;}
.month-header{display:flex;align-items:center;justify-content:space-between;padding:12px 18px;background:var(--bg3);cursor:pointer;user-select:none;transition:background .15s;}
.month-header:hover{background:var(--bg4);}
.month-header-left{display:flex;align-items:center;gap:10px;}
.month-dot{width:8px;height:8px;border-radius:50%;background:var(--green);}
.month-name{font-size:14px;font-weight:700;}
.month-count{font-size:11px;color:var(--muted);background:var(--bg4);padding:2px 8px;border-radius:10px;}
.month-chev{font-size:11px;color:var(--muted);transition:transform .2s;}
.month-group.collapsed .month-chev{transform:rotate(-90deg);}
.month-group.collapsed .month-body{display:none;}
.frente-group{border-top:1px solid var(--border);}
.frente-group:first-child{border-top:none;}
.frente-subheader{display:flex;align-items:center;gap:8px;padding:8px 18px;cursor:pointer;user-select:none;background:transparent;transition:background .15s;}
.frente-subheader:hover{background:rgba(255,255,255,0.03);}
.frente-bullet{width:6px;height:6px;border-radius:2px;flex-shrink:0;}
.frente-subname{font-size:12px;font-weight:600;color:var(--muted);flex:1;}
.frente-subcount{font-size:10px;color:var(--muted2);margin-right:6px;}
.frente-subchev{font-size:10px;color:var(--muted2);transition:transform .2s;}
.frente-group.collapsed .frente-subchev{transform:rotate(-90deg);}
.frente-group.collapsed .frente-body{display:none;}
.frente-body{padding:0 10px 10px 10px;}
.icard{border-radius:10px;margin-bottom:6px;background:var(--bg2);border:1px solid var(--border);overflow:hidden;transition:border-color .15s;}
.icard:hover{border-color:var(--border2);}
.icard.done .icard-main{opacity:0.45;}
.icard.done .iname{text-decoration:line-through;color:var(--muted);}
.icard-main{display:flex;align-items:center;gap:10px;padding:10px 12px;cursor:pointer;border-left:3px solid var(--fc,var(--border2));transition:background .15s;}
.icard-main:hover{background:rgba(255,255,255,0.03);}
.ipri{width:24px;height:24px;border-radius:6px;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:800;cursor:default;background:var(--bg3);border:1px solid var(--border2);color:var(--muted2);}
.ipri[data-val]{background:var(--yellow-d);border-color:var(--yellow);color:var(--yellow);}
.iname{flex:1;font-size:13px;font-weight:500;line-height:1.4;}
.imeta{display:flex;align-items:center;gap:6px;flex-wrap:wrap;flex-shrink:0;}
.itag{padding:2px 8px;border-radius:10px;font-size:10px;font-weight:600;white-space:nowrap;}
.iprog{font-size:10px;padding:2px 7px;border-radius:10px;font-weight:700;white-space:nowrap;}
.idone-btn{width:22px;height:22px;border-radius:6px;border:1px solid var(--border2);background:transparent;color:var(--muted);font-size:11px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .15s;}
.idone-btn:hover{border-color:var(--green);color:var(--green);}
.icard.done .idone-btn{background:var(--green-d);border-color:var(--green);color:var(--green);}
.chev{font-size:10px;color:var(--muted);transition:transform .2s;flex-shrink:0;margin-left:2px;}
.icard.open .chev{transform:rotate(90deg);}
.idel{font-size:11px;color:var(--muted2);cursor:pointer;padding:3px 7px;border-radius:4px;flex-shrink:0;opacity:0;transition:all .15s;}
.icard-main:hover .idel{opacity:1;}
.idel:hover{color:var(--red);background:var(--red-d);}
.iexpand{display:none;border-top:1px solid var(--border);}
.icard.open .iexpand{display:block;}
.exp-inner{padding:14px;}
.edit-row{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:14px;}
.edit-field{display:flex;flex-direction:column;gap:4px;min-width:120px;}
.ef-label{font-size:10px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;}
.ef-input,.ef-select{background:var(--bg3);border:1px solid var(--border2);border-radius:8px;color:var(--text);padding:7px 10px;font-size:12px;font-family:inherit;transition:border-color .15s;}
.ef-input:focus,.ef-select:focus{outline:none;border-color:var(--green);}
.ef-input[type=number]{width:80px;}

/* ── MULTI-RESP ── */
.resp-multi-wrap{position:relative;}
.resp-trigger{display:flex;align-items:center;gap:6px;flex-wrap:wrap;min-height:36px;background:var(--bg3);border:1px solid var(--border2);border-radius:8px;padding:5px 32px 5px 8px;cursor:pointer;transition:border-color .15s;}
.resp-trigger:hover,.resp-trigger.open{border-color:var(--green);}
.resp-tag{display:inline-flex;align-items:center;gap:3px;padding:2px 7px;border-radius:12px;font-size:11px;font-weight:600;white-space:nowrap;}
.resp-tag-del{font-size:10px;cursor:pointer;opacity:.6;}
.resp-tag-del:hover{opacity:1;}
.resp-placeholder{font-size:12px;color:var(--muted2);}
.resp-caret{position:absolute;right:8px;top:50%;transform:translateY(-50%);font-size:10px;color:var(--muted);pointer-events:none;transition:transform .15s;}
.resp-trigger.open .resp-caret{transform:translateY(-50%) rotate(180deg);}
.resp-dropdown{display:none;position:absolute;top:calc(100% + 4px);left:0;right:0;background:var(--bg3);border:1px solid var(--border2);border-radius:10px;box-shadow:0 8px 24px rgba(0,0,0,.4);z-index:300;overflow:hidden;}
.resp-dropdown.open{display:block;}
.resp-opt{display:flex;align-items:center;gap:8px;padding:8px 12px;cursor:pointer;transition:background .12s;}
.resp-opt:hover{background:rgba(255,255,255,0.05);}
.resp-opt.checked{background:rgba(61,214,140,0.06);}
.resp-check{width:16px;height:16px;border-radius:4px;border:1.5px solid var(--border2);flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:10px;transition:all .12s;}
.resp-opt.checked .resp-check{background:var(--green);border-color:var(--green);color:#000;}
.resp-opt-avatar{width:20px;height:20px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:800;color:#fff;flex-shrink:0;}
.resp-opt-name{font-size:12px;font-weight:500;flex:1;}
.resp-add-row{display:flex;align-items:center;gap:6px;padding:8px 12px;border-top:1px solid var(--border);}
.resp-add-row input{flex:1;background:var(--bg4);border:1px solid var(--border);border-radius:6px;color:var(--text);padding:5px 8px;font-size:12px;font-family:inherit;}
.resp-add-row input:focus{outline:none;border-color:var(--green);}
.resp-add-row button{padding:5px 10px;border-radius:6px;background:var(--green-d);border:1px solid var(--green);color:var(--green);font-size:11px;font-weight:700;cursor:pointer;}

/* ── RESULTADO ── */
.resultado-row{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:14px;padding:12px;background:var(--bg3);border-radius:10px;border:1px solid var(--border);}
.res-field{display:flex;flex-direction:column;gap:4px;flex:1;min-width:140px;}
.res-label{font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;display:flex;align-items:center;gap:5px;}
.res-label span{font-size:9px;background:var(--yellow-d);color:var(--yellow);padding:1px 5px;border-radius:4px;font-weight:700;}
.res-input{background:var(--bg2);border:1px solid var(--border2);border-radius:8px;color:var(--text);padding:7px 10px;font-size:13px;font-weight:700;font-family:inherit;transition:border-color .15s;}
.res-input:focus{outline:none;border-color:var(--yellow);}
.res-input::placeholder{color:var(--muted2);font-weight:400;font-size:12px;}

/* ── CHECKLIST ── */
.cl-title{font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;margin-bottom:8px;}
.cl-item{display:flex;align-items:center;gap:8px;padding:5px 0;border-bottom:1px solid var(--border);}
.cl-item:last-child{border-bottom:none;}
/* nome editável inline */
.cl-name{flex:1;font-size:12px;background:transparent;border:none;color:var(--text);font-family:inherit;padding:2px 4px;border-radius:4px;cursor:text;transition:background .12s;}
.cl-name:hover{background:rgba(255,255,255,0.04);}
.cl-name:focus{outline:none;background:var(--bg3);box-shadow:0 0 0 1px var(--border2);}
.cl-btns{display:flex;gap:4px;}
.cl-btn{padding:3px 9px;border-radius:6px;border:1px solid var(--border2);background:transparent;color:var(--muted);font-size:10px;font-weight:700;cursor:pointer;transition:all .15s;}
.cl-btn.yes{background:var(--green-d);border-color:var(--green);color:var(--green);}
.cl-btn.no{background:var(--red-d);border-color:var(--red);color:var(--red);}
.cl-btn.na{background:var(--bg4);border-color:var(--border2);color:var(--muted);}
.cl-del{font-size:10px;color:var(--muted2);cursor:pointer;padding:2px 5px;border-radius:4px;flex-shrink:0;}
.cl-del:hover{color:var(--red);}
.cl-add{display:flex;gap:6px;margin-top:8px;}
.cl-add input{flex:1;background:var(--bg3);border:1px solid var(--border);border-radius:8px;color:var(--text);padding:6px 10px;font-size:12px;font-family:inherit;}
.cl-add input:focus{outline:none;border-color:var(--green);}
.cl-add button{padding:6px 12px;border-radius:8px;background:var(--green-d);border:1px solid var(--green);color:var(--green);font-size:11px;font-weight:700;cursor:pointer;}
.notes-area{width:100%;background:var(--bg3);border:1px solid var(--border);border-radius:8px;color:var(--text);padding:8px 10px;font-size:12px;font-family:inherit;resize:vertical;min-height:56px;margin-top:10px;}
.notes-area:focus{outline:none;border-color:var(--green);}

/* Timeline */
.tl-container{overflow-x:auto;}
.tl-table{width:100%;border-collapse:collapse;min-width:700px;}
.tl-table th{font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;padding:8px 12px;background:var(--bg2);border-bottom:1px solid var(--border);text-align:left;white-space:nowrap;}
.tl-table td{padding:6px 12px;border-bottom:1px solid var(--border);font-size:12px;vertical-align:middle;}
.tl-table tr:hover td{background:rgba(255,255,255,0.02);}
.tl-bar-cell{padding:4px 8px;position:relative;}
.tl-bar-wrap{position:relative;height:22px;background:var(--bg3);border-radius:6px;overflow:hidden;}
.tl-bar{position:absolute;top:2px;bottom:2px;left:4px;right:4px;border-radius:4px;opacity:.85;cursor:default;transition:opacity .15s;}
.tl-bar:hover{opacity:1;}
/* tooltip — a célula pai tem overflow:visible para o tooltip não ser cortado */
.tl-bar-cell{overflow:visible;}
.tl-bar-wrap{overflow:hidden;}
.tl-tooltip{
  display:none;position:absolute;bottom:calc(100% + 10px);left:50%;transform:translateX(-50%);
  background:#1C2333;border:1px solid rgba(255,255,255,0.2);color:#E8EAF0;
  font-size:11px;font-weight:600;white-space:nowrap;padding:5px 10px;border-radius:8px;
  pointer-events:none;z-index:9999;box-shadow:0 4px 16px rgba(0,0,0,.6);
}
.tl-bar-cell:hover .tl-tooltip{display:block;}
.tl-badge{display:inline-block;padding:2px 8px;border-radius:8px;font-size:10px;font-weight:700;}

/* Calendar */
.cal-nav{display:flex;align-items:center;gap:12px;margin-bottom:20px;}
.cal-nav-btn{background:var(--bg3);border:1px solid var(--border2);color:var(--text);border-radius:8px;padding:7px 14px;font-size:13px;cursor:pointer;transition:all .15s;}
.cal-nav-btn:hover{border-color:var(--green);color:var(--green);}
.cal-nav-title{font-size:16px;font-weight:800;flex:1;}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:2px;}
.cal-dow{text-align:center;font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;padding:6px 0;}
.cal-day{background:var(--bg2);border:1px solid var(--border);border-radius:8px;min-height:80px;padding:6px;transition:border-color .15s;overflow:hidden;}
.cal-day:hover{border-color:var(--border2);}
.cal-day.today{border-color:var(--green);}
.cal-day.other-month{opacity:.35;}
.cal-day-num{font-size:11px;font-weight:700;color:var(--muted);margin-bottom:4px;}
.cal-day.today .cal-day-num{color:var(--green);}
.cal-event{padding:2px 6px;border-radius:5px;font-size:10px;font-weight:600;margin-bottom:2px;cursor:pointer;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.cal-event.destaque-ev{border:1px solid #E3B341;background:rgba(227,179,65,0.15)!important;color:#E3B341!important;}
.cal-event:hover{opacity:.8;}

/* Modal */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.65);z-index:500;display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity .2s;}
.modal-overlay.open{opacity:1;pointer-events:all;}
.modal{background:var(--bg2);border:1px solid var(--border2);border-radius:18px;padding:28px;width:min(520px,92vw);max-height:90vh;overflow-y:auto;}
.modal-title{font-size:17px;font-weight:800;margin-bottom:4px;}
.modal-sub{font-size:12px;color:var(--muted);margin-bottom:20px;}
.mfield{margin-bottom:14px;}

const PESSOA_COLORS={'@Thainá':'#3DD68C','@Luca':'#B48EF7','@Otávio':'#58A6FF','@Luana':'#22D3EE','@Helena':'#FB923C','@Victor':'#E3B341','@Júlia':'#F87171','@Lorena':'#A78BFA','@Beatriz':'#34D399','@Débora':'#60A5FA','@Bruno':'#FBBF24','@Ramon':'#F472B6','@João':'#94A3B8'};
function getPessoas(){try{return JSON.parse(localStorage.getItem(SK+'_pessoas')||'null')||PESSOAS_DEFAULT;}catch(e){return PESSOAS_DEFAULT;}}
function savePessoas(p){localStorage.setItem(SK+'_pessoas',JSON.stringify(p));}
function pessoaColor(nome){return PESSOA_COLORS[nome]||PESSOA_COLORS['@'+nome.replace(/^@/,'')]||'#7A7F96';}
function pessoaInitial(nome){return (nome||'?').replace('@','').charAt(0).toUpperCase();}

/* chave de comparação: remove @, acentos, espaços, lowercase */
function _normKey(s){
  return String(s||'').replace(/^@/,'').trim()
    .normalize('NFD').replace(/[\u0300-\u036f]/g,'')
    .toLowerCase().replace(/\s+/g,'');
}

/* resolve qualquer variação para o nome canônico da lista de pessoas */
function _canonicalize(raw){
  if(!raw) return '';
  const pessoas=getPessoas();
  const key=_normKey(raw);
  const found=pessoas.find(p=>_normKey(p)===key);
  if(found) return found;
  const base=String(raw).trim();
  return base.startsWith('@')?base:'@'+base;
}

/* resp pode ser string (legado), array ou string com múltiplas pessoas */
function normResp(v){
  if(!v||v==='') return [];
  const raws=Array.isArray(v)?v:[String(v)];
  const flat=[];
  raws.forEach(item=>{
    const str=String(item||'').trim();
    if(!str) return;
    // separar por vírgula OU por @ lookahead ("@A @B" sem vírgula)
    const parts=str.includes(',')?str.split(','):str.split(/(?=@)/).filter(Boolean);
    parts.forEach(p=>{ const t=p.trim(); if(t&&t!=='@') flat.push(_canonicalize(t)); });
  });
  // deduplicar por normKey
  const seen=new Set();
  return flat.filter(p=>{ const k=_normKey(p); if(!k||seen.has(k)) return false; seen.add(k); return true; });
}
function respLabel(v){
  const arr=normResp(v);
  if(!arr.length) return '—';
  return arr.join(', ');
}

function load(){try{return JSON.parse(localStorage.getItem(SK)||'{}');}catch(e){return {};}}
function save(d){localStorage.setItem(SK,JSON.stringify(d));}
function getItems(fid){const d=load();if(d[fid])return d[fid];const s=JSON.parse(JSON.stringify(SEED[fid]||[]));const d2=load();d2[fid]=s;save(d2);return s;}
function setItems(fid,items){const d=load();d[fid]=items;save(d);}
function getCL(fid,idx){const d=load();const k='cl_'+fid+'_'+idx;if(d[k])return d[k];const cl=DEFAULT_CL.map(n=>({name:n,status:'none'}));d[k]=cl;save(d);return cl;}
function setCL(fid,idx,cl){const d=load();d['cl_'+fid+'_'+idx]=cl;save(d);}
function getNotes(fid,idx){const d=load();return d['notes_'+fid+'_'+idx]||'';}
function setNotes(fid,idx,v){const d=load();d['notes_'+fid+'_'+idx]=v;save(d);}
function getRes(fid,idx){const d=load();return d['res_'+fid+'_'+idx]||{tpv:'',atv:''};}
function setRes(fid,idx,field,val){const d=load();const k='res_'+fid+'_'+idx;if(!d[k])d[k]={tpv:'',atv:''};d[k][field]=val;save(d);}
function prog(fid,idx){const cl=getCL(fid,idx);if(!cl.length)return 0;return Math.round(cl.filter(c=>c.status==='yes').length/cl.length*100);}
function progColor(p){return p>=80?'var(--green)':p>=40?'var(--yellow)':'var(--red)';}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function fmtDate(ds){if(!ds)return '';const[y,m,d]=ds.split('-');return d+'/'+m+'/'+y;}

  if(newPessoas) savePessoas(pessoas);
  const seenPessoas=new Set();
  const filtPessoas=pessoas.filter(p=>{

  });
  h+='<button class="fchip" onclick="openFrenteModal()" style="border-style:dashed;margin-left:4px" title="Nova frente">＋</button>';
  h+='<div style="width:1px;height:18px;background:var(--border);margin:0 6px;flex-shrink:0"></div>';

  // SQUAD chips — apenas squads das frentes selecionadas
  const fidsAtivos=getFids();
  const squadsAtivos=new Set();
  fidsAtivos.forEach(fid=>{
    if(squadByFrente[fid]) squadByFrente[fid].forEach(sq=>squadsAtivos.add(sq));
  });
  if(squadsAtivos.size>0){
    const squadsOrdenados=[...squadsAtivos].sort();
    h+='<span class="fb-label" style="min-width:40px">SQUAD:</span>';
    h+='<button class="fchip '+(curSquad.size===0?'active':'')+'" onclick="setSquad(\'all\')">Todos</button>';
    squadsOrdenados.forEach(sq=>{
      const act=curSquad.has(sq);
      h+='<button class="fchip '+(act?'active':'')+'" onclick="setSquad(\''+sq.replace(/\\/g,'\\\\').replace(/'/g,"\\'")+'\')">'+esc(sq)+'</button>';
    });
  }
  h+='</div>'; // fecha linha 1 (FRENTE + SQUAD)

  /* ── linha 2: PESSOA chips filtradas pelas frentes ativas ── */

  const pessoasByFrente={};

      normResp(it.resp).forEach(p=>{
        if(!p||p.length<=1) return;
        if(!pessoasByFrente[fid]) pessoasByFrente[fid]=new Set();
        pessoasByFrente[fid].add(p);

  // pessoas das frentes ativas, deduplicadas

  if(pessoasAtivas.length>0){

  /* ── linha 2: TRI + MESES ── */

  });
  h+='<div style="width:1px;height:18px;background:var(--border);margin:0 4px"></div>';
  h+='<button class="mchip '+(curMonth===null?'active':'')+'" onclick="setMonth(null)">Todos</button>';
  (TRI[curTri]||[]).forEach(m=>{
    h+='<button class="mchip '+(curMonth===m?'mactive':'')+'" onclick="setMonth(\''+m+'\')">'+(m)+'/26</button>';
  });
  h+='</div>';

    });
    h+='<div style="width:1px;height:18px;background:var(--border);margin:0 6px;flex-shrink:0"></div>';
  }
  h+='<button class="fchip '+(curDestaque?'active':'')+'" onclick="setDestaque('+(!curDestaque)+')" style="'+(curDestaque?'border-color:#E3B341;background:rgba(227,179,65,0.15);color:#E3B341':'')+'" title="Mostrar apenas destaques">⭐ Destaques</button>';
  if(curView==='plan'){
    h+='<div class="add-btns"><button class="add-btn" onclick="openModal()">＋ Iniciativa</button></div>';

  fb.innerHTML=h;

/* retorna array de fids ativos (curFrente vazio = todas) */
function getFids(){
  if(curFrente.size===0) return Object.keys(FM);
  return Object.keys(FM).filter(id=>curFrente.has(id));
}

function setPlanView(v){curPlanView=v;buildFilterBar();render();}
function setPlanOrder(v){curPlanOrder=v;buildFilterBar();render();}

function setView(v){curView=v;buildHeader();render();}
function setTri(t){curTri=t;curMonth=null;buildHeader();render();}
function setFrente(f){
  // toggle: adiciona ou remove do Set — mínimo 1 sempre selecionado
  if(curFrente.has(f)){
    if(curFrente.size>1) curFrente.delete(f); // não permite desselecionar o último
  } else {
    curFrente.add(f);
  }
  // ao mudar frente, limpar squads que não pertencem mais às frentes ativas
  curSquad=new Set([...curSquad].filter(sq=>{
    const fids=getFids();
    return fids.some(fid=>{
      const items=getItems(fid);
      return items.some(it=>(it.squad||'').trim()===sq);
    });
  }));
  buildHeader();render();
}
function setMonth(m){curMonth=curMonth===m?null:m;buildHeader();render();}
function setPessoa(p){
  if(p==='all'){curPessoa=new Set();}
  else{if(curPessoa.has(p))curPessoa.delete(p);else curPessoa.add(p);}
  buildFilterBar();render();
}
function setSquad(s){
  if(s==='all'){curSquad=new Set();}
  else{if(curSquad.has(s))curSquad.delete(s);else curSquad.add(s);}
  buildFilterBar();render();
}
function setDestaque(v){curDestaque=v;buildFilterBar();render();}

function matchSquad(it){
  if(curSquad.size===0) return true;
  return curSquad.has((it.squad||'').trim());
}

function render(){
  _saveNiState();
  invalidateRankMap(); // recalcular ranks a cada render
  const main=document.getElementById('mainArea');
  if(curView==='gerencial') main.innerHTML=renderGerencial();
  else if(curView==='plan'){
    if(curPlanView==='list') main.innerHTML=renderPlan();
    else if(curPlanView==='timeline') main.innerHTML=renderTimeline();
    else if(curPlanView==='calendar') main.innerHTML=renderCalendar();
    else if(curPlanView==='matrix') main.innerHTML=renderMatrix();
  }
  else if(curView==='todos') main.innerHTML=renderTodos();
}

function matchPessoa(it){
  if(curPessoa.size>0){
    const resps=normResp(it.resp).map(p=>_normKey(p));
    const match=[...curPessoa].some(p=>resps.includes(_normKey(p)));
    if(!match) return false;
  }
  if(curSquad.size>0 && !curSquad.has((it.squad||'').trim())) return false;
  if(curDestaque && !it.destaque) return false;
  return true;
}

/* ─── GERENCIAL ─── */
function renderGerencial(){
  const filtMonths=curMonth?[curMonth]:(TRI[curTri]||[]);
  const fids=getFids();

  const all=[];
  fids.forEach(fid=>getItems(fid).forEach((it,i)=>{
    const _itMes=it.mes||it.start; if(_itMes&&!filtMonths.includes(_itMes)) return;
    if(!matchPessoa(it)) return;
    all.push({fid,idx:i,it});
  }));

  const total=all.length,done=all.filter(x=>x.it.done).length,pct=total?Math.round(done/total*100):0;
  const period=curMonth?`${curMonth}/26`:curTri;

  // agregar TPV e Ativação projetados e realizados
  let tpvProj=0,tpvReal=0,atvProj=0,atvReal=0;
  all.forEach(({fid,idx})=>{
    const res=getRes(fid,idx);
    tpvProj+=parseTpv(res.tpv);
    tpvReal+=parseTpv(res.tpvReal);
    atvProj+=parseAtv(res.atv);
    atvReal+=parseAtv(res.atvReal);
  });

  const fmtM=v=>v===0?'—':(v>=1?`R$ ${v.toFixed(1).replace('.',',')}M`:`R$ ${(v*1000).toFixed(0)}K`);
  const fmtN=v=>v===0?'—':v>=1000?`${(v/1000).toFixed(1).replace('.',',')}K`:String(Math.round(v));
  const pctReal=(proj,real)=>proj>0?Math.round(real/proj*100):null;

  const tpvPct=pctReal(tpvProj,tpvReal);
  const atvPct=pctReal(atvProj,atvReal);

  let h=`<div class="kpi-row">
    <div class="kpi"><div class="kpi-val" style="color:var(--blue)">${total}</div><div class="kpi-lbl">Iniciativas · ${period}</div></div>
    <div class="kpi"><div class="kpi-val" style="color:var(--green)">${done}</div><div class="kpi-lbl">Entregues</div></div>
    <div class="kpi"><div class="kpi-val" style="color:var(--yellow)">${total-done}</div><div class="kpi-lbl">Em Andamento</div></div>
    <div class="kpi"><div class="kpi-val" style="color:var(--purple)">${pct}%</div><div class="kpi-lbl">Progresso</div></div>
  </div>`;

  // ── calcular dados por frente, subdivididos por squad ──
  const frenteData=[];
  fids.forEach(fid=>{
    const meta=FM[fid];
    const allWithIdx=getItems(fid).map((it,i)=>({it,i}));
    const visible=allWithIdx.filter(({it})=>(!(it.mes||it.start)||filtMonths.includes(it.mes||it.start))&&matchPessoa(it));
    if(!visible.length) return;

    // totais da frente
    let tot=0,dn=0,ftpvP=0,ftpvR=0,fatvP=0,fatvR=0;
    // squads dentro da frente
    const bySquad={};
    visible.forEach(({it,i})=>{
      const res=getRes(fid,i);
      tot++; if(it.done) dn++;
      ftpvP+=parseTpv(res.tpv); ftpvR+=parseTpv(res.tpvReal||'');
      fatvP+=parseAtv(res.atv); fatvR+=parseAtv(res.atvReal||'');
      const sq=(it.squad||'').trim()||'—';
      if(!bySquad[sq]) bySquad[sq]={tot:0,dn:0,tpvP:0,tpvR:0,atvP:0,atvR:0};
      bySquad[sq].tot++; if(it.done) bySquad[sq].dn++;
      bySquad[sq].tpvP+=parseTpv(res.tpv); bySquad[sq].tpvR+=parseTpv(res.tpvReal||'');
      bySquad[sq].atvP+=parseAtv(res.atv); bySquad[sq].atvR+=parseAtv(res.atvReal||'');
    });
    frenteData.push({fid,meta,tot,dn,ftpvP,ftpvR,fatvP,fatvR,bySquad});
  });

  frenteData.sort((a,b)=>(b.ftpvP||b.tot)-(a.ftpvP||a.tot));

  // ── helper: uma barra dupla ──
  function barLine(hex, proj, real, fmtVal, maxVal){
    if(proj<=0) return '';
    const wP=Math.round(proj/maxVal*100);
    const wR=real>0?Math.min(Math.round(real/maxVal*100),100):0;
    const pct=real>0?Math.round(real/proj*100):null;
    const pc=pct===null?'var(--muted2)':pct>=80?'#3DD68C':pct>=50?'#E3B341':'#F87171';
    let c='';
    c+='<div style="display:flex;align-items:center;gap:6px;margin-bottom:2px">';
    c+='<span style="font-size:9px;color:var(--muted2);width:48px;flex-shrink:0;text-align:right">Proj.</span>';
    c+='<div style="flex:1;position:relative;height:8px;background:var(--bg4);border-radius:4px;overflow:hidden">';
    c+='<div style="position:absolute;top:0;left:0;height:100%;width:'+wP+'%;background:'+hex+';opacity:0.3;border-radius:4px"></div>';
    c+='</div>';
    c+='<span style="font-size:10px;font-weight:700;color:var(--muted);width:52px;flex-shrink:0">'+fmtVal(proj)+'</span>';
    c+='</div>';
    c+='<div style="display:flex;align-items:center;gap:6px">';
    c+='<span style="font-size:9px;color:#3DD68C;width:48px;flex-shrink:0;text-align:right">Real.</span>';
    c+='<div style="flex:1;position:relative;height:8px;background:var(--bg4);border-radius:4px;overflow:hidden">';
    if(wR>0) c+='<div style="position:absolute;top:0;left:0;height:100%;width:'+wR+'%;background:'+hex+';border-radius:4px"></div>';
    c+='</div>';
    c+='<span style="font-size:10px;font-weight:700;width:52px;flex-shrink:0">';
    c+=real>0?'<span style="color:#3DD68C">'+fmtVal(real)+'</span> <span style="font-size:9px;font-weight:800;color:'+pc+'">'+pct+'%</span>':'<span style="color:var(--muted2)">—</span>';
    c+='</span></div>';
    return c;
  }

  // ── 3 gráficos em grid ──
  const maxAcoes=Math.max(...frenteData.map(f=>f.tot),1);
  const maxTpv=Math.max(...frenteData.map(f=>f.ftpvP),0.001);
  const maxAtv=Math.max(...frenteData.map(f=>f.fatvP),1);

  function makeChart(title, getProjReal, maxVal, fmtVal){
    let c='<div style="background:var(--bg2);border:1px solid var(--border);border-radius:14px;padding:20px">';
    c+='<div style="font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;margin-bottom:16px">'+title+'</div>';
    if(frenteData.length===0){
      c+='<div style="font-size:11px;color:var(--muted2);font-style:italic">Sem dados.</div>';
    } else {
      frenteData.forEach(f=>{
        const {proj,real}=getProjReal(f);
        if(proj<=0) return;
        const uid='gc_'+f.fid+'_'+title.replace(/\W/g,'');
        const squads=Object.keys(f.bySquad).sort((a,b)=>a==='—'?1:b==='—'?-1:a.localeCompare(b));
        const hasSquads=squads.length>1||(squads.length===1&&squads[0]!=='—');

        c+='<div style="margin-bottom:16px">';
        // cabeçalho da frente (clicável se tem squads)
        c+='<div style="display:flex;align-items:center;gap:6px;margin-bottom:6px;cursor:'+(hasSquads?'pointer':'default')+'" '+(hasSquads?'onclick="toggleGC(\''+uid+'\')"':'')+'>';
        c+='<span style="width:8px;height:8px;border-radius:50%;background:'+f.meta.hex+';flex-shrink:0;display:inline-block"></span>';
        c+='<span style="font-size:12px;font-weight:800;color:'+f.meta.hex+'">'+f.meta.name+'</span>';
        if(hasSquads) c+='<span id="gc_chev_'+uid+'" style="font-size:9px;color:var(--muted2);transition:transform .2s">▶</span>';
        c+='</div>';

        // barra da frente (total)
        c+=barLine(f.meta.hex,proj,real,fmtVal,maxVal);

        // squads colapsáveis
        if(hasSquads){
          c+='<div id="'+uid+'" style="display:none;margin-top:8px;padding-left:14px;border-left:2px solid '+f.meta.hex+'33">';
          squads.forEach(sq=>{
            const sd=f.bySquad[sq];
            const sqpr=getProjReal({ftpvP:sd.tpvP,ftpvR:sd.tpvR,fatvP:sd.atvP,fatvR:sd.atvR,tot:sd.tot,dn:sd.dn});
            if(sqpr.proj<=0) return;
            c+='<div style="margin-bottom:10px">';
            c+='<div style="font-size:10px;font-weight:700;color:var(--muted);margin-bottom:4px">'+esc(sq==='—'?'Sem squad':sq)+'</div>';
            c+=barLine(f.meta.hex,sqpr.proj,sqpr.real,fmtVal,maxVal);
            c+='</div>';
          });
          c+='</div>';
        }
        c+='</div>';
      });
    }
    c+='</div>';
    return c;
  }

  // ── 1 card por frente, cada um com 3 métricas + squads ──
  frenteData.forEach(f=>{
    const uid='gf_'+f.fid;
    const squads=Object.keys(f.bySquad).sort((a,b)=>a==='—'?1:b==='—'?-1:a.localeCompare(b));
    const hasSquads=squads.length>1||(squads.length===1&&squads[0]!=='—');
    const maxAcF=Math.max(f.tot,1);
    const maxTpvF=Math.max(f.ftpvP,0.001);
    const maxAtvF=Math.max(f.fatvP,1);

    h+='<div style="background:var(--bg2);border:1px solid var(--border);border-radius:14px;padding:20px;margin-bottom:16px">';

    // cabeçalho da frente
    h+='<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px">';
    h+='<div style="display:flex;align-items:center;gap:8px">';
    h+='<span style="width:10px;height:10px;border-radius:50%;background:'+f.meta.hex+';flex-shrink:0;display:inline-block"></span>';
    h+='<span style="font-size:14px;font-weight:800;color:'+f.meta.hex+'">'+f.meta.name+'</span>';
    h+='<span style="font-size:11px;color:var(--muted2);padding:2px 8px;background:var(--bg4);border-radius:10px">'+f.tot+' ações</span>';
    h+='</div>';
    if(hasSquads){
      h+='<button onclick="toggleGC(\''+uid+'\')" style="font-size:11px;color:var(--muted);background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:4px 10px;cursor:pointer">';
      h+='<span id="gc_chev_'+uid+'" style="display:inline-block;transition:transform .2s">▶</span> Squads</button>';
    }
    h+='</div>';

    // 3 mini-gráficos em linha
    h+='<div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px">';

    // helper mini
    function mini(label, proj, real, fmtVal, maxV){
      if(proj<=0) return '<div style="background:var(--bg3);border-radius:8px;padding:12px"><div style="font-size:10px;font-weight:700;color:var(--muted2);margin-bottom:6px">'+label+'</div><div style="font-size:11px;color:var(--muted2);font-style:italic">—</div></div>';
      const wP=100;
      const wR=proj>0&&real>0?Math.min(Math.round(real/proj*100),100):0;
      const pct=real>0?Math.round(real/proj*100):null;
      const pc=pct===null?'var(--muted2)':pct>=80?'#3DD68C':pct>=50?'#E3B341':'#F87171';
      let m='<div style="background:var(--bg3);border-radius:8px;padding:12px">';
      m+='<div style="font-size:10px;font-weight:700;color:var(--muted2);text-transform:uppercase;margin-bottom:8px">'+label+'</div>';
      m+='<div style="font-size:16px;font-weight:800;color:var(--text);margin-bottom:2px">'+fmtVal(proj)+'</div>';
      m+='<div style="font-size:10px;color:var(--muted2);margin-bottom:8px">Projetado</div>';
      // barra
      m+='<div style="position:relative;height:6px;background:var(--bg4);border-radius:3px;overflow:hidden;margin-bottom:6px">';
      m+='<div style="position:absolute;top:0;left:0;height:100%;width:100%;background:'+f.meta.hex+';opacity:0.25;border-radius:3px"></div>';
      if(wR>0) m+='<div style="position:absolute;top:0;left:0;height:100%;width:'+wR+'%;background:'+f.meta.hex+';border-radius:3px"></div>';
      m+='</div>';
      if(real>0){
        m+='<div style="display:flex;align-items:baseline;gap:6px">';
        m+='<span style="font-size:13px;font-weight:700;color:#3DD68C">'+fmtVal(real)+'</span>';
        m+='<span style="font-size:10px;font-weight:800;color:'+pc+'">'+pct+'%</span>';
        m+='</div>';
        m+='<div style="font-size:10px;color:var(--muted2)">Realizado</div>';
      } else {
        m+='<div style="font-size:11px;color:var(--muted2)">Sem realizado</div>';
      }
      m+='</div>';
      return m;
    }

    h+=mini('📋 Ações', f.tot, f.dn, v=>String(v), maxAcF);
    h+=mini('💰 TPV', f.ftpvP, f.ftpvR, fmtM, maxTpvF);
    h+=mini('👤 Ativação', f.fatvP, f.fatvR, fmtN, maxAtvF);
    h+='</div>'; // grid

    // squads colapsáveis
    if(hasSquads){
      h+='<div id="'+uid+'" style="display:none;margin-top:16px;border-top:1px solid var(--border);padding-top:14px">';
      h+='<div style="display:grid;gap:10px">';
      squads.forEach(sq=>{
        const sd=f.bySquad[sq];
        h+='<div style="background:var(--bg3);border-radius:8px;padding:12px;border-left:3px solid '+f.meta.hex+'44">';
        h+='<div style="font-size:11px;font-weight:700;color:'+f.meta.hex+';margin-bottom:10px">'+esc(sq==='—'?'Sem squad':sq)+'</div>';
        h+='<div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px">';
        // ações
        h+='<div><div style="font-size:9px;color:var(--muted2);text-transform:uppercase;margin-bottom:4px">Ações</div>';
        h+='<span style="font-size:14px;font-weight:800;color:var(--text)">'+sd.tot+'</span>';
        if(sd.dn>0) h+=' <span style="font-size:11px;color:#3DD68C">'+sd.dn+' ✓</span>';
        h+='</div>';
        // TPV
        h+='<div><div style="font-size:9px;color:var(--muted2);text-transform:uppercase;margin-bottom:4px">TPV</div>';
        h+='<span style="font-size:14px;font-weight:800;color:var(--text)">'+fmtM(sd.tpvP)+'</span>';
        if(sd.tpvR>0) h+=' <span style="font-size:11px;color:#3DD68C">'+fmtM(sd.tpvR)+'</span>';
        h+='</div>';
        // Ativação
        h+='<div><div style="font-size:9px;color:var(--muted2);text-transform:uppercase;margin-bottom:4px">Ativação</div>';
        h+='<span style="font-size:14px;font-weight:800;color:var(--text)">'+fmtN(sd.atvP)+'</span>';
        if(sd.atvR>0) h+=' <span style="font-size:11px;color:#3DD68C">'+fmtN(sd.atvR)+'</span>';
        h+='</div>';
        h+='</div></div>'; // grid squads + card
      });
      h+='</div></div>'; // squads container
    }

    h+='</div>'; // card frente
  });

  if(total===0) h+=`<div class="empty">Nenhuma iniciativa para o período selecionado.</div>`;
  return h;
}

/* ─── PLAN ─── */
function renderPlan(){
  const filtMonths=curMonth?[curMonth]:(TRI[curTri]||[]);
  const fids=getFids();
  let h=renderNewItemPanel();

  // Itens sem mês definido ficam num bucket especial
  const semMesItems=[];
  fids.forEach(fid=>{
    const meta=FM[fid];
    getItems(fid).forEach((it,i)=>{
      if(it.mes||it.start) return; // tem mês — vai pro bucket normal
      if(!matchPessoa(it)) return;
      semMesItems.push({fid,idx:i,it,meta});
    });
  });

  filtMonths.forEach(m=>{
    // coletar todos os itens do mês com índice real preservado
    const allItems=[];
    fids.forEach(fid=>{
      const meta=FM[fid];
      getItems(fid).forEach((it,i)=>{
        if((it.mes||it.start)!==m) return;
        if(!matchPessoa(it)) return;
        allItems.push({fid,idx:i,it,meta});
      });
    });
    if(!allItems.length) return;

    // ── modo PRIORIDADE (quando filtrando por pessoa) ──
    if(curPlanOrder==='prioridade'&&curPessoa.size>0){
      const rm=getRankMap();
      const _pk=[...curPessoa].map(p=>_normKey(p));
      function getPri(d){
        // flagPriority → sempre pri=0 (topo)
        if(d.it.flagPriority===true||d.it.flagPriority==='true') return 0;
        for(const pk of _pk){
          const r=rm[d.fid+'__'+d.idx+'__'+pk];
          if(r&&r.pri!=null) return r.pri;
        }
        const resp=normResp(d.it.resp);
        const r0=resp.length>0?(rm[d.fid+'__'+d.idx+'__'+_normKey(resp[0])]||{}):({});
        return r0.pri!=null?r0.pri:999;
      }
      allItems.sort((a,b)=>{
        if(a.it.done&&!b.it.done) return 1;
        if(!a.it.done&&b.it.done) return -1;
        const ap=getPri(a), bp=getPri(b);
        if(ap!==bp) return ap-bp;
        return (a.it.squad||'').localeCompare(b.it.squad||'');
      });

      // renderizar lista plana sem agrupamento por squad
      let listHtml='';
      allItems.forEach(d=>{
        listHtml+=renderCard(d.fid,d.idx,d.it,d.meta.color,d.meta.hex);
      });
      const total=allItems.length;
      const mgId='mg_'+m;
      const isByPri=curPlanOrder==='prioridade';
      const orderBtn=curPessoa.size>0?`<div style="display:flex;align-items:center;gap:4px;margin-right:8px">
        <button onclick="event.stopPropagation();setPlanOrder('squad')" style="font-size:10px;font-weight:700;padding:2px 8px;border-radius:6px;border:1px solid ${!isByPri?'var(--blue)':'var(--border2)'};background:${!isByPri?'var(--blue-d)':'transparent'};color:${!isByPri?'var(--blue)':'var(--muted)'};cursor:pointer">Squad</button>
        <button onclick="event.stopPropagation();setPlanOrder('prioridade')" style="font-size:10px;font-weight:700;padding:2px 8px;border-radius:6px;border:1px solid ${isByPri?'var(--blue)':'var(--border2)'};background:${isByPri?'var(--blue-d)':'transparent'};color:${isByPri?'var(--blue)':'var(--muted)'};cursor:pointer">Prioridade</button>
      </div>`:'';
      h+=`<div class="month-group" id="${mgId}">
        <div class="month-header" onclick="toggleMG('${mgId}')">
          <div class="month-header-left"><div class="month-dot"></div><div class="month-name">${m}/26</div><div class="month-count">${total} iniciativas</div></div>
          <div style="display:flex;align-items:center">${orderBtn}<div class="month-chev">▼</div></div>
        </div><div class="month-body">${listHtml}</div>
      </div>`;
      return;
    }

    // ── modo SQUAD (padrão) ──
    const squadMap={};
    allItems.forEach(d=>{
      const sq=(d.it.squad||'').trim()||'—';
      if(!squadMap[sq]) squadMap[sq]=[];
      squadMap[sq].push(d);
    });

    // ordenar squads: com nome primeiro (alfabético), "—" por último
    const squads=Object.keys(squadMap).sort((a,b)=>{
      if(a==='—') return 1; if(b==='—') return -1;
      return a.localeCompare(b);
    });

    let monthHtml='';
    squads.forEach(sq=>{
      const items=squadMap[sq];
      const rm2=getRankMap();
      const _pk2=[...curPessoa].map(p=>_normKey(p));
      function getPri2(d){
        // flagPriority → sempre pri=0 (topo)
        if(d.it.flagPriority===true||d.it.flagPriority==='true') return 0;
        // buscar por pessoa filtrada primeiro
        for(const pk of _pk2){
          const r=rm2[d.fid+'__'+d.idx+'__'+pk];
          if(r&&r.pri!=null) return r.pri;
        }
        // fallback: buscar por primeiro responsável
        const resp=normResp(d.it.resp);
        if(resp.length>0){
          const r=rm2[d.fid+'__'+d.idx+'__'+_normKey(resp[0])];
          if(r&&r.pri!=null) return r.pri;
        }
        return 999;
      }
      items.sort((a,b)=>{
        if(a.it.done&&!b.it.done) return 1;
        if(!a.it.done&&b.it.done) return -1;
        return getPri2(a)-getPri2(b);
      });

      // cor do squad = cor da frente mais comum no grupo
      const frenteFreq={};
      items.forEach(d=>{ frenteFreq[d.fid]=(frenteFreq[d.fid]||0)+1; });
      const domFid=Object.entries(frenteFreq).sort((a,b)=>b[1]-a[1])[0][0];
      const domMeta=FM[domFid]||{hex:'#7A7F96',color:'var(--muted2)'};

      const fgId='fg_'+m+'_'+sq.replace(/[^a-z0-9]/gi,'_');
      monthHtml+='<div class="frente-group" id="'+fgId+'">';
      monthHtml+='<div class="frente-subheader" onclick="toggleFG(\''+fgId+'\')">';
      monthHtml+='<div class="frente-bullet" style="background:'+domMeta.hex+'"></div>';
      monthHtml+='<div class="frente-subname">'+esc(sq==='—'?'Sem squad':sq)+'</div>';
      monthHtml+='<div class="frente-subcount">'+items.length+' item'+(items.length!==1?'s':'')+'</div>';
      monthHtml+='<div class="frente-subchev">▶</div>';
      monthHtml+='</div><div class="frente-body">';
      items.forEach(d=>{ monthHtml+=renderCard(d.fid,d.idx,d.it,d.meta.color,d.meta.hex); });
      monthHtml+='</div></div>';
    });

    const total=allItems.length;
    const mgId='mg_'+m;
    const isByPri2=curPlanOrder==='prioridade';
    const orderBtn2=curPessoa.size>0?`<div style="display:flex;align-items:center;gap:4px;margin-right:8px">
      <button onclick="event.stopPropagation();setPlanOrder('squad')" style="font-size:10px;font-weight:700;padding:2px 8px;border-radius:6px;border:1px solid ${!isByPri2?'var(--blue)':'var(--border2)'};background:${!isByPri2?'var(--blue-d)':'transparent'};color:${!isByPri2?'var(--blue)':'var(--muted)'};cursor:pointer">Squad</button>
      <button onclick="event.stopPropagation();setPlanOrder('prioridade')" style="font-size:10px;font-weight:700;padding:2px 8px;border-radius:6px;border:1px solid ${isByPri2?'var(--blue)':'var(--border2)'};background:${isByPri2?'var(--blue-d)':'transparent'};color:${isByPri2?'var(--blue)':'var(--muted)'};cursor:pointer">Prioridade</button>
    </div>`:'';
    h+=`<div class="month-group" id="${mgId}">
      <div class="month-header" onclick="toggleMG('${mgId}')">
        <div class="month-header-left"><div class="month-dot"></div><div class="month-name">${m}/26</div><div class="month-count">${total} iniciativas</div></div>
        <div style="display:flex;align-items:center">${orderBtn2}<div class="month-chev">▼</div></div>
      </div><div class="month-body">${monthHtml}</div>
    </div>`;
  });

  // Bucket "Sem data" — itens sem prazo definido
  if(semMesItems.length && !curMonth){
    // agrupar por frente
    const bySF={};
    semMesItems.forEach(d=>{
      const fid=d.fid;
      if(!bySF[fid]) bySF[fid]={meta:d.meta,items:[]};
      bySF[fid].items.push(d);
    });
    let sdHtml='';
    Object.entries(bySF).forEach(([fid,{meta,items}])=>{
      sdHtml+=`<div class="frente-group"><div class="frente-subheader" onclick="toggleFG(this)"><span class="frente-bullet" style="background:${meta.hex}"></span><span class="frente-subname">${esc(meta.name)}</span><span class="frente-subcount">${items.length}</span><span class="frente-subchev">▼</span></div><div class="frente-body">`;
      items.forEach(d=>{ sdHtml+=renderCard(d.fid,d.idx,d.it,d.meta.color,d.meta.hex); });
      sdHtml+='</div></div>';
    });
    h+=`<div class="month-group" id="mg_semdata">
      <div class="month-header" onclick="toggleMG('mg_semdata')">
        <div class="month-header-left"><div class="month-dot" style="background:var(--muted2)"></div><div class="month-name" style="color:var(--muted)">Sem data</div><div class="month-count">${semMesItems.length} iniciativas</div></div>
        <div class="month-chev">▼</div>
      </div><div class="month-body">${sdHtml}</div>
    </div>`;
  }

  return h||'<div class="empty">Nenhuma iniciativa para os filtros selecionados.</div>';
}

function toggleMG(id){document.getElementById(id)?.classList.toggle('collapsed');}
function toggleFG(id){document.getElementById(id)?.classList.toggle('collapsed');}

/* ─── CARD ─── */
function renderCard(fid,idx,it,color,hex){
  const p=prog(fid,idx),pc=progColor(p);
  const respArr=normResp(it.resp);
  const isDone=!!it.done;
  const res=getRes(fid,idx);
  // usar rank calculado em memória (funciona sem localStorage)
  const _rm=getRankMap();
  // buscar rank específico da pessoa filtrada, senão usar o geral (primeiro responsável)
  const _respKey=normResp(it.resp).length>0?_normKey(normResp(it.resp)[0]):'__sem_resp__';
  const _curPessoaKey=curPessoa.size>0?_normKey([...curPessoa][0]):'';
  const rm=(_curPessoaKey&&_rm[fid+'__'+idx+'__'+_curPessoaKey])
    ||_rm[fid+'__'+idx+'__'+_respKey]
    ||_rm[fid+'__'+idx]
    ||{};
  const pri=it.priManual&&it.pri!=null?it.pri:(rm.pri??null);
  const priAuto=rm.priAuto??false;

  const mes=it.mes||it.start||'';
  let pills='';
  if(it.squad) pills+=`<span class="itag" style="background:${hex}22;color:${hex};font-weight:700">${esc(it.squad)}</span>`;
  if(it.dateStart) pills+=`<span class="itag" style="background:var(--purple-d);color:var(--purple)">▶ ${fmtDate(it.dateStart)}</span>`;
  if(it.dateEnd) pills+=`<span class="itag" style="background:var(--purple-d);color:var(--purple)">◀ ${fmtDate(it.dateEnd)}</span>`;
  if(it.esforco) pills+=`<span class="itag" style="background:var(--blue-d);color:var(--blue)">${it.esforco}</span>`;
  if(res.tpv) pills+=`<span class="itag" style="background:var(--yellow-d);color:var(--yellow)">💰 ${esc(res.tpv)}</span>`;
  if(res.atv) pills+=`<span class="itag" style="background:var(--orange-d);color:var(--orange)">👤 ${esc(res.atv)}</span>`;
  if(isDone)  pills+=`<span class="itag" style="background:var(--green-d);color:var(--green)">✓ Entregue</span>`;

  /* avatares dos responsáveis */
  let ownerHtml='';
  if(respArr.length===0){
    ownerHtml=`<span style="font-size:10px;color:var(--muted2);background:var(--bg3);padding:2px 8px;border-radius:10px">—</span>`;
  } else {
    ownerHtml=`<span style="display:inline-flex;align-items:center;gap:3px">`;
    respArr.forEach(p=>{
      const cor=pessoaColor(p),ini=pessoaInitial(p);
      ownerHtml+=`<span title="${esc(p)}" style="width:20px;height:20px;border-radius:50%;background:${cor};color:#fff;font-size:9px;font-weight:800;display:inline-flex;align-items:center;justify-content:center">${ini}</span>`;
    });
    if(respArr.length===1) ownerHtml+=`<span style="font-size:10px;color:${pessoaColor(respArr[0])};margin-left:2px">${esc(respArr[0])}</span>`;
    ownerHtml+=`</span>`;
  }

  const cardStyle=(it.flagPriority===true||it.flagPriority==='true')?'box-shadow:0 0 0 2px var(--red);':it.destaque?'box-shadow:0 0 0 2px #E3B341;':'';
  const fcColor=(it.flagPriority===true||it.flagPriority==='true')?'var(--red)':it.destaque?'#E3B341':color;
  const isFlagged=it.flagPriority===true||it.flagPriority==='true';
  const priStyle=pri===0?'background:var(--red-d);border-color:var(--red);color:var(--red)':'';
  const priLabel=pri===0?'!':(pri!==null?(priAuto?'⚡'+pri:pri):'—');
  const priAttr=pri!==null?'data-val="'+(pri>0?pri:0)+'"':'data-empty';
  const flagIcon=isFlagged?'<span title="Prioridade Absoluta" style="font-size:13px;flex-shrink:0">🔴</span>'
                :it.destaque?'<span title="Destaque" style="font-size:13px;flex-shrink:0">⭐</span>':'';
  const nameHtml=it.destaque
    ?'⭐ <span style="color:#E3B341;font-weight:800">'+esc(it.name)+'</span>'
    :esc(it.name);

  return '<div class="icard '+(isDone?'done':'')+' '+(it.destaque?'icard-destaque':'')+'" id="ic_'+fid+'_'+idx+'" style="'+cardStyle+'">'
    +'<div class="icard-main" onclick="toggleCard(\''+fid+'\','+idx+')" style="--fc:'+fcColor+'">'
      +'<div class="ipri" '+priAttr+' onclick="event.stopPropagation()" title="'+(priAuto?'Prioridade calculada automaticamente (ICE)':'Prioridade manual')+'" style="'+priStyle+'">'
        +priLabel
      +'</div>'
      +'<div class="iname">'+nameHtml+'</div>'
      +'<div class="imeta">'+pills+ownerHtml+'</div>'
      +''
      +flagIcon
      +'<button class="idone-btn" onclick="event.stopPropagation();toggleDone(\''+fid+'\','+idx+')">✓</button>'
      +'<span class="idel" onclick="event.stopPropagation();delItem(\''+fid+'\','+idx+')">✕</span>'
      +'<span class="chev">▶</span>'
    +'</div>'
    +'<div class="iexpand" id="exp_'+fid+'_'+idx+'">'+renderExpand(fid,idx,it)+'</div>'
  +'</div>';
}

/* ─── EXPAND ─── */
function renderExpand(fid,idx,it){
  const cl=getCL(fid,idx),notes=getNotes(fid,idx),res=getRes(fid,idx);
  const respArr=normResp(it.resp);
  const mOpts=val=>MNAMES.map(m=>`<option ${val===m?'selected':''}>${m}</option>`).join('');
  const pessoas=getPessoas();

  /* multi-resp: trigger + dropdown */

/* ─── ICE AUTO-RANK ─── */
const ESFORCO_PESO={P:1,M:2,G:3,GG:4};

/* converte TPV string → número em milhões (ex: "R$ 2,5M" → 2.5, "500k" → 0.5) */
function parseTpv(str){
  if(!str) return 0;
  const s=String(str).replace(/[R$\s.]/g,'').replace(',','.');
  const n=parseFloat(s);
  if(isNaN(n)) return 0;
  if(/B/i.test(str)) return n*1000;
  if(/M/i.test(str)) return n;
  if(/K/i.test(str)) return n/1000;
  // valor solto — heurística: se >1000 provavelmente está em reais, converter para M
  return n>1000?n/1000000:n;
}

/* converte ativação string → número */
function parseAtv(str){
  if(!str) return 0;
  const s=String(str).replace(/[.\s]/g,'').replace(',','.');
  const n=parseFloat(s);
  return isNaN(n)?0:n;
}

/* score TPV: a cada 1000 de TPV incremental → 0.00004 */
function scoreTpv(tpvM){
  if(tpvM<=0) return 0;
  // tpvM está em milhões → converter para reais → dividir por 1000 → multiplicar por coef
  const tpvReais=tpvM*1000000;
  return (tpvReais/1000)*0.00004;
}

/* score Ativação: a cada 1 ativação → 0.06666 */
function scoreAtv(atv){
  if(atv<=0) return 0;
  return atv*0.06666;
}

function iceScore(fid,idx){
  const it=getItems(fid)[idx];
  if(!it) return 0;
  const res=getRes(fid,idx);
  const tpvM=parseTpv(res.tpv)||parseTpv(res.tpvReal)||0;
  const atv=parseAtv(res.atv)||parseAtv(res.atvReal)||0;
  const stpv=scoreTpv(tpvM);
  const satv=scoreAtv(atv);

  // se só um preenchido → usa ele; se os dois → usa o maior
  let impact=0;
  if(stpv>0&&satv>0) impact=Math.max(stpv,satv);
  else impact=stpv||satv;

  if(impact===0) return 0;
  const esf=ESFORCO_PESO[it.esforco]||2;
  return impact/esf;
}

function autoRankFrente(fid){
  const items=getItems(fid);
  const mesList=[...new Set(items.map(it=>it.mes||it.start).filter(Boolean))];

  function quadPeso(resultado,esf){
    // com nova escala de score, só distingue "tem dados" (1) vs "sem dados" (5)
    if(resultado===0) return 5;
    return 1;
  }

  mesList.forEach(mes=>{
    const grupo=items.map((it,i)=>({it,i})).filter(({it})=>(it.mes||it.start)===mes&&!it.done);

    // ── flagPriority: pri=0 sempre, independente de pessoa ──
    const flagged=grupo.filter(({it})=>it.flagPriority===true||it.flagPriority==='true');
    const normal =grupo.filter(({it})=>it.flagPriority!==true&&it.flagPriority!=='true');

    flagged.sort((a,b)=>iceScore(fid,b.i)-iceScore(fid,a.i));
    flagged.forEach(({i})=>{
      items[i].pri=0;
      items[i].priAuto=true;
      items[i].priManual=false;
    });

    // ── normais: agrupar por pessoa, ranquear dentro de cada pessoa ──
    // uma iniciativa com múltiplos responsáveis entra no grupo do primeiro
    const byPessoa={};
    normal.forEach(d=>{
      const resp=normResp(d.it.resp);
      const key=resp.length>0?_normKey(resp[0]):'__sem_resp__';
      if(!byPessoa[key]) byPessoa[key]=[];
      byPessoa[key].push(d);
    });

    Object.values(byPessoa).forEach(grupo=>{
      const scored=grupo.map(({it,i})=>{
        const res=getRes(fid,i);
        const tpvM=parseTpv(res.tpv)||0;
        const atv=parseAtv(res.atv)||0;
        const stpv=scoreTpv(tpvM), satv=scoreAtv(atv);
        let resultado=0;
        if(stpv>0&&satv>0) resultado=Math.max(stpv,satv); else resultado=stpv||satv;
        const esf=ESFORCO_PESO[it.esforco]||0;
        const qp=quadPeso(resultado,esf);
        return {i,resultado,esf,qp};
      });

      scored.sort((a,b)=>{ const sa=a.resultado/Math.sqrt(a.esf||1); const sb=b.resultado/Math.sqrt(b.esf||1); if(Math.abs(sa-sb)>0.01) return sb-sa; return a.esf-b.esf; });

      let rank=1;
      scored.forEach(({i,qp})=>{
        if(items[i].priManual) return;
        if(qp===5){
          items[i].pri=null;
          items[i].priAuto=false;
        } else {
          items[i].pri=rank++;
          items[i].priAuto=true;
        }
      });
    });
  });

  setItems(fid,items);
}

/* calcula ranks em memória sem salvar — funciona para qualquer pessoa que abrir o arquivo */
function calcRankMap(){
  const allFids=Object.keys(FM);
  const rankMap={}; // chave: fid+'__'+idx → {pri, priAuto}

  function quadPeso(resultado,esf){
    // com nova escala de score, só distingue "tem dados" (1) vs "sem dados" (5)
    if(resultado===0) return 5;
    return 1;
  }

  const allItems=[];
  allFids.forEach(fid=>{
    getItems(fid).forEach((it,idx)=>allItems.push({fid,idx,it}));
  });

  const mesList=[...new Set(allItems.map(({it})=>it.mes||it.start).filter(Boolean))];

  mesList.forEach(mes=>{
    const grupo=allItems.filter(({it})=>(it.mes||it.start)===mes&&!it.done);
    const flagged=grupo.filter(({it})=>it.flagPriority===true||it.flagPriority==='true');
    const normal =grupo.filter(({it})=>it.flagPriority!==true&&it.flagPriority!=='true');

    flagged.forEach(({fid,idx})=>{
      rankMap[fid+'__'+idx]={pri:0,priAuto:true};
    });

    // agrupar por CADA responsável (não só o primeiro)
    // cada item entra no ranking de todos os seus responsáveis
    const byPessoa={};
    normal.forEach(d=>{
      const resps=normResp(d.it.resp);
      const keys=resps.length>0?resps.map(r=>_normKey(r)):['__sem_resp__'];
      keys.forEach(key=>{
        if(!byPessoa[key]) byPessoa[key]=[];
        byPessoa[key].push(d);
      });
    });

    Object.entries(byPessoa).forEach(([pessoaKey,grp])=>{
      const scored=grp.map(({fid,idx,it})=>{
        const res=getRes(fid,idx);
        const tpvM=parseTpv(res.tpv)||0;
        const atv=parseAtv(res.atv)||0;
        const stpv=scoreTpv(tpvM),satv=scoreAtv(atv);
        let resultado=0;
        if(stpv>0&&satv>0) resultado=Math.max(stpv,satv); else resultado=stpv||satv;
        const esf=ESFORCO_PESO[it.esforco]||0;
        return {fid,idx,it,resultado,esf,qp:quadPeso(resultado,esf)};
      });
      scored.sort((a,b)=>{ const sa=a.resultado/Math.sqrt(a.esf||1); const sb=b.resultado/Math.sqrt(b.esf||1); if(Math.abs(sa-sb)>0.01) return sb-sa; return a.esf-b.esf; });
      let rank=1;
      scored.forEach(({fid,idx,it,qp})=>{
        if(it.priManual){
          // manual: guardar para esta pessoa se ainda não tem
          const k=fid+'__'+idx+'__'+pessoaKey;
          if(!rankMap[k]) rankMap[k]={pri:it.pri,priAuto:false};
          return;
        }
        if(qp===5){
          rankMap[fid+'__'+idx+'__'+pessoaKey]={pri:null,priAuto:false};
        } else {
          rankMap[fid+'__'+idx+'__'+pessoaKey]={pri:rank++,priAuto:true};
        }
      });
    });
  });

  return rankMap;
}

// cache do rankMap — recalculado a cada render()
let _rankMap=null;
function getRankMap(){ if(!_rankMap) _rankMap=calcRankMap(); return _rankMap; }
function invalidateRankMap(){ _rankMap=null; }

function autoRankAll(){
  // Ranking global: por pessoa + mês, cruzando todas as frentes
  const allFids=Object.keys(FM);

  function quadPeso(resultado,esf){
    // com nova escala de score, só distingue "tem dados" (1) vs "sem dados" (5)
    if(resultado===0) return 5;
    return 1;
  }

  // 1. Coletar todos os itens de todas as frentes com referência para atualização
  const allItems=[];
  allFids.forEach(fid=>{
    getItems(fid).forEach((it,idx)=>{
      allItems.push({fid,idx,it});
    });
  });

  // 2. Agrupar por mês
  const mesList=[...new Set(allItems.map(({it})=>it.mes||it.start).filter(Boolean))];

  mesList.forEach(mes=>{
    const grupo=allItems.filter(({it})=>(it.mes||it.start)===mes&&!it.done);

    // flagPriority → pri=0
    const flagged=grupo.filter(({it})=>it.flagPriority===true||it.flagPriority==='true');
    const normal =grupo.filter(({it})=>it.flagPriority!==true&&it.flagPriority!=='true');

    flagged.forEach(({fid,idx,it})=>{
      it.pri=0; priAuto=true; it.priManual=false;
    });

    // agrupar normais por pessoa (primeiro responsável)
    const byPessoa={};
    normal.forEach(d=>{
      const resp=normResp(d.it.resp);
      const key=resp.length>0?_normKey(resp[0]):'__sem_resp__';
      if(!byPessoa[key]) byPessoa[key]=[];
      byPessoa[key].push(d);
    });

    Object.values(byPessoa).forEach(grp=>{
      const scored=grp.map(({fid,idx,it})=>{
        const res=getRes(fid,idx);
        const tpvM=parseTpv(res.tpv)||0;
        const atv=parseAtv(res.atv)||0;
        const stpv=scoreTpv(tpvM),satv=scoreAtv(atv);
        let resultado=0;
        if(stpv>0&&satv>0) resultado=Math.max(stpv,satv); else resultado=stpv||satv;
        const esf=ESFORCO_PESO[it.esforco]||0;
        return {fid,idx,it,resultado,esf,qp:quadPeso(resultado,esf)};
      });

      scored.sort((a,b)=>{ const sa=a.resultado/Math.sqrt(a.esf||1); const sb=b.resultado/Math.sqrt(b.esf||1); if(Math.abs(sa-sb)>0.01) return sb-sa; return a.esf-b.esf; });

      let rank=1;
      scored.forEach(({it,qp})=>{
        if(it.priManual) return;
        if(qp===5){ it.pri=null; priAuto=false; }
        else { it.pri=rank++; priAuto=true; }
      });
    });
  });

  // 3. Salvar todas as frentes de volta
  allFids.forEach(fid=>setItems(fid,getItems(fid)));
}
function changeFrente(oldFid,idx,newFid){
  if(oldFid===newFid) return;
  // mover item para nova frente
  const items=getItems(oldFid);
  if(!items[idx]) return;
  const it=items[idx];
  // copiar dados auxiliares (res, notes, cl)
  const d=load();
  const oldKey=`${oldFid}_${idx}`;
  const newItems=getItems(newFid);
  const newIdx=newItems.length;
  const newKey=`${newFid}_${newIdx}`;
  // transferir res/notes/cl
  ['res_','notes_','cl_'].forEach(prefix=>{
    const v=d[prefix+oldKey];
    if(v!==undefined){d[prefix+newKey]=v;delete d[prefix+oldKey];}
  });
  // remover do antigo, adicionar no novo
  items.splice(idx,1);
  d[oldFid]=items;
  newItems.push(it);
  d[newFid]=newItems;
  save(d);
  render();
}
function updatePri(fid,idx,val){
  const items=getItems(fid);if(!items[idx])return;
  const n=parseInt(val);
  items[idx].pri=isNaN(n)?null:n;
  items[idx].priManual=!isNaN(n); // marcar como manual para respeitar
  items[idx].priAuto=false;
  setItems(fid,items);render();
}
function delItem(fid,idx){if(!confirm('Remover esta iniciativa?'))return;const items=getItems(fid);items.splice(idx,1);setItems(fid,items);render();}

/* ─── TIMELINE ─── */
function renderTimeline(){
  const filtMonths=curMonth?[curMonth]:(TRI[curTri]||[]);
  const fids=getFids();
  // mapa mês → índice de coluna
  const mIdx={};filtMonths.forEach((m,i)=>mIdx[m]=i);
  const totalCols=filtMonths.length;

  let allItems=[];
  fids.forEach(fid=>{const meta=FM[fid];getItems(fid).forEach((it,i)=>{const m=it.mes||it.start;if(!m||!filtMonths.includes(m)||!matchPessoa(it))return;allItems.push({...it,_mes:m,_fid:fid,_idx:i,_meta:meta});});});
  if(!allItems.length) return `<div class="empty">Nenhuma iniciativa para os filtros selecionados.</div>`;
  allItems.sort((a,b)=>{const fo=Object.keys(FM);const fd=fo.indexOf(a._fid)-fo.indexOf(b._fid);return fd||((MI[a.start]||0)-(MI[b.start]||0));});
  const colW=Math.floor(100/totalCols);
  let h=`<div class="tl-container"><table class="tl-table"><thead><tr><th style="width:200px">Iniciativa</th><th style="width:110px">Squad</th><th style="width:80px">Resp.</th>`;
  filtMonths.forEach(m=>h+=`<th style="width:${colW}%;text-align:center">${m}/26</th>`);
  h+=`<th style="width:50px">%</th></tr></thead><tbody>`;
  allItems.forEach(it=>{
    const meta=it._meta,p=prog(it._fid,it._idx),pc=progColor(p);
    const respArr=normResp(it.resp);
    const avatars=respArr.map(pp=>`<span title="${esc(pp)}" style="width:18px;height:18px;border-radius:50%;background:${pessoaColor(pp)};color:#fff;font-size:8px;font-weight:800;display:inline-flex;align-items:center;justify-content:center">${pessoaInitial(pp)}</span>`).join('');
    const squadLabel=it.squad?`<span style="font-size:10px;font-weight:700;padding:2px 7px;border-radius:5px;background:${meta.hex}22;color:${meta.hex}">${esc(it.squad)}</span>`:`<span style="font-size:10px;color:var(--muted2)">—</span>`;
    const nameCell=it.destaque?`<span style="color:#E3B341;font-weight:800">⭐ ${esc(it.name)}</span>`:esc(it.name);
    const rowStyle=it.destaque?'background:rgba(227,179,65,0.05);':'';
    h+=`<tr style="${rowStyle}"><td style="font-weight:500">${nameCell}</td>`;
    h+=`<td>${squadLabel}</td>`;
    h+=`<td><span style="display:inline-flex;align-items:center;gap:3px">${avatars}</span></td>`;

    // calcular span de colunas usando dateStart/dateEnd se disponíveis, senão start/end
    const sMonth=it._mes||it.mes||it.start, eMonth=it._mes||it.mes||it.start;
    const sCol=mIdx[sMonth]??0;
    const eCol=mIdx[eMonth]??sCol;

    // posicionamento da barra dentro do mês
    const dsValid=it.dateStart&&!isNaN(new Date(it.dateStart+'T12:00:00'));
    const deValid=it.dateEnd&&!isNaN(new Date(it.dateEnd+'T12:00:00'));
    const dayOf=ds=>new Date(ds+'T12:00:00').getDate();
    // left: 0%=início do mês, right: 0%=fim do mês
    const leftPct =dsValid?Math.max(0,Math.min(90,Math.round((dayOf(it.dateStart)-1)/30*90))):0;
    const rightPct=deValid?Math.max(0,Math.min(90,Math.round((30-dayOf(it.dateEnd))/30*90))):0;
    const tip=(dsValid?fmtDate(it.dateStart):'')+(deValid?' → '+fmtDate(it.dateEnd):'');

    filtMonths.forEach((m,ci)=>{
      if(ci===sCol){
        const spanCols=eCol-sCol+1;
        const l=spanCols>1?'0%':leftPct+'%';
        const r=spanCols>1?'0%':rightPct+'%';
        const tipHtml=tip?`<div class="tl-tooltip">${tip}</div>`:'';
        h+=`<td class="tl-bar-cell" colspan="${spanCols}"><div class="tl-bar-wrap"><div class="tl-bar" style="background:${meta.hex};left:${l};right:${r}"></div></div>${tipHtml}</td>`;
      } else if(ci>sCol&&ci<=eCol){
        // coberto pelo colspan
      } else {
        h+=`<td></td>`;
      }
    });
    h+=`<td><span style="font-size:10px;color:${pc};font-weight:700">${p}%</span></td></tr>`;
  });
  return h+`</tbody></table></div>`;
}

/* ─── MATRIX ─── */
function renderMatrix(){
  const filtMonths=curMonth?[curMonth]:(TRI[curTri]||[]);
  const fids=getFids();

  // ── coletar todos os itens do período com seus dados ──
  const items=[];
  fids.forEach(fid=>{
    const meta=FM[fid];
    getItems(fid).forEach((it,idx)=>{
      const _tm=it.mes||it.start; if(_tm&&!filtMonths.includes(_tm)) return;
      if(!matchPessoa(it)) return;
      const res=getRes(fid,idx);
      const tpvM=parseTpv(res.tpv)||0;
      const atv=parseAtv(res.atv)||0;
      const stpv=scoreTpv(tpvM);
      const satv=scoreAtv(atv);
      let resultado=0;
      if(stpv>0&&satv>0) resultado=Math.max(stpv,satv);
      else resultado=stpv||satv;
      const esf=ESFORCO_PESO[it.esforco]||0;
      items.push({fid,idx,it,meta,res,tpvM,atv,stpv,satv,resultado,esf,esforco:it.esforco||''});
    });
  });

  // ── quadrantes: eixo X = Esforço (P/M/G/GG + sem), eixo Y = Resultado (0-100) ──
  // Resultado: 0=sem dado, 20=baixo, 40=médio-baixo, 60=médio, 80=alto, 100=muito alto
  // Esforço: P=1, M=2, G=3, GG=4, sem=0
  // 4 quadrantes clássicos:
  //  Quick Win  = resultado>=60 e esf<=2 (alto resultado, baixo esforço)
  //  Big Bet    = resultado>=60 e esf>=3 (alto resultado, alto esforço)
  //  Fill In    = resultado<60  e esf<=2 (baixo resultado, baixo esforço)
  //  Hard No    = resultado<60  e esf>=3 (baixo resultado, alto esforço)
  //  Sem dados  = resultado===0 e esf===0

  function getQuad(resultado,esf){
    if(resultado===0&&esf===0) return 'nodata';
    if(resultado===0) return esf<=2?'fillin':'hardno';
    if(resultado>=60) return esf===0||esf<=2?'quickwin':'bigbet';
    return esf===0||esf<=2?'fillin':'hardno';
  }

  const Q={
    quickwin:{items:[],label:'⚡ Quick Win',sub:'Alto resultado · Baixo esforço',bg:'rgba(61,214,140,0.08)',border:'rgba(61,214,140,0.3)',head:'#3DD68C'},
    bigbet:  {items:[],label:'🎯 Big Bet',  sub:'Alto resultado · Alto esforço', bg:'rgba(88,166,255,0.08)',border:'rgba(88,166,255,0.3)',head:'#58A6FF'},
    fillin:  {items:[],label:'📌 Fill In',  sub:'Baixo resultado · Baixo esforço',bg:'rgba(227,179,65,0.08)',border:'rgba(227,179,65,0.3)',head:'#E3B341'},
    hardno:  {items:[],label:'🚫 Hard No',  sub:'Baixo resultado · Alto esforço', bg:'rgba(248,113,113,0.08)',border:'rgba(248,113,113,0.3)',head:'#F87171'},
    nodata:  {items:[],label:'❓ Sem Dados',sub:'Esforço e resultado não preenchidos',bg:'rgba(122,127,150,0.06)',border:'rgba(122,127,150,0.2)',head:'#7A7F96'},
  };

  items.forEach(d=>{
    const q=getQuad(d.resultado,d.esf);
    Q[q].items.push(d);
  });

  // ordenar cada quadrante: resultado desc, esforço asc
  Object.values(Q).forEach(q=>{
    q.items.sort((a,b)=>b.resultado-a.resultado||a.esf-b.esf);
  });

  // ── legenda de esforço ──
  const ESF_LABEL={P:'Pequeno',M:'Médio',G:'Grande',GG:'Muito Grande'};
  function fmtScore(r){ if(!r||r<=0) return '—'; return r.toFixed(1); }

  function chip(d){
    const resp=normResp(d.it.resp);
    const respHtml=resp.slice(0,2).map(p=>{
      const cor=pessoaColor(p),ini=pessoaInitial(p);
      return '<span style="width:16px;height:16px;border-radius:50%;background:'+cor+';color:#000;font-size:9px;font-weight:800;display:inline-flex;align-items:center;justify-content:center;flex-shrink:0" title="'+p+'">'+ini+'</span>';
    }).join('');
    const esforcoHtml=d.esforco?'<span style="font-size:9px;font-weight:700;padding:1px 5px;border-radius:4px;background:var(--blue-d);color:var(--blue)">'+d.esforco+'</span>':'';
    const resHtml=d.resultado>0?'<span style="font-size:9px;font-weight:700;padding:1px 5px;border-radius:4px;background:'+d.meta.hex+'22;color:'+d.meta.hex+'">'+fmtScore(d.resultado)+'</span>':'';
    const doneHtml=d.it.done?'<span style="font-size:9px;font-weight:700;padding:1px 5px;border-radius:4px;background:rgba(61,214,140,0.15);color:#3DD68C">✓</span>':'';
    const isDestaque=!!d.it.destaque;
    const chipBorder=isDestaque?'1px solid #E3B341':'1px solid var(--border)';
    const chipBg=isDestaque?'rgba(227,179,65,0.07)':'var(--bg3)';
    const nameHtml=isDestaque?'⭐ <span style="color:#E3B341;font-weight:800">'+esc(d.it.name)+'</span>':esc(d.it.name);
    const hoverColor=isDestaque?'#E3B341':d.meta.hex;
    return '<div onclick="goToItem(\''+d.fid+'\','+d.idx+')" style="display:flex;flex-direction:column;gap:5px;padding:9px 11px;border-radius:10px;border:'+chipBorder+';background:'+chipBg+';cursor:pointer;transition:border-color .15s;'+(d.it.done?'opacity:0.55;':'')+'" onmouseenter="this.style.borderColor=\''+hoverColor+'\'" onmouseleave="this.style.borderColor=\''+(isDestaque?'#E3B341':'var(--border)')+'\'">'
      +'<div style="font-size:11px;font-weight:600;line-height:1.3">'+nameHtml+'</div>'
      +'<div style="display:flex;align-items:center;gap:5px;flex-wrap:wrap">'
        +'<span style="font-size:9px;font-weight:700;padding:1px 6px;border-radius:4px;background:'+d.meta.hex+'22;color:'+d.meta.hex+';border:1px solid '+d.meta.hex+'33">'+d.meta.name+'</span>'
        +esforcoHtml+resHtml+doneHtml
      +'</div>'
      +'<div style="display:flex;align-items:center;gap:4px">'+respHtml+'<span style="font-size:10px;color:var(--muted);margin-left:2px">'+(d.it.mes||d.it.start||'')+'</span></div>'
      +'</div>';
  }

  function quadCard(key){
    const q=Q[key];
    if(q.items.length===0) return '<div style="background:'+q.bg+';border:1px solid '+q.border+';border-radius:14px;padding:18px;display:flex;flex-direction:column;gap:12px">'
      +'<div style="display:flex;justify-content:space-between;align-items:flex-start">'
        +'<div><div style="font-size:13px;font-weight:800;color:'+q.head+'">'+q.label+'</div>'
        +'<div style="font-size:11px;color:var(--muted);margin-top:2px">'+q.sub+'</div></div>'
        +'<span style="font-size:11px;font-weight:700;padding:2px 8px;border-radius:20px;background:var(--bg4);color:var(--muted2)">0</span>'
      +'</div>'
      +'<div style="font-size:11px;color:var(--muted2);font-style:italic;padding:8px 0">Nenhuma iniciativa aqui.</div>'
      +'</div>';
    return '<div style="background:'+q.bg+';border:1px solid '+q.border+';border-radius:14px;padding:18px;display:flex;flex-direction:column;gap:12px">'
      +'<div style="display:flex;justify-content:space-between;align-items:flex-start">'
        +'<div><div style="font-size:13px;font-weight:800;color:'+q.head+'">'+q.label+'</div>'
        +'<div style="font-size:11px;color:var(--muted);margin-top:2px">'+q.sub+'</div></div>'
        +'<span style="font-size:11px;font-weight:700;padding:2px 8px;border-radius:20px;background:'+q.head+'22;color:'+q.head+'">'+q.items.length+'</span>'

      +'<div style="display:flex;flex-direction:column;gap:7px">'
        +q.items.map(chip).join('')
      +'</div>'
      +'</div>';

  // ── visual chart de bolhas: eixo X=Esforço, Y=Resultado ──
  function bubbleChart(){
    const W=560,H=320,PL=52,PB=36,PT=16,PR=16;
    const cW=W-PL-PR, cH=H-PT-PB;
    // eixos: X de 0.5 a 4.5 (P=1,M=2,G=3,GG=4), Y de 0 a 105
    const xLabels=[{v:1,l:'P'},{v:2,l:'M'},{v:3,l:'G'},{v:4,l:'GG'}];
    const yTicks=[0,20,40,60,80,100];
    const toX=v=>PL+((v-0.5)/(4.5-0.5))*cW;
    const toY=v=>PT+cH-((v/105)*cH);

    // ── uma bolha por célula (esf × resultado), cor da frente com mais itens ──
    // tooltip interativo via foreignObject não funciona bem em SVG estático,
    // então usamos uma div sobreposta controlada por JS
    const byPos={};
    items.forEach(d=>{
      if(d.esf===0||d.resultado===0) return;
      const key=d.esf+'_'+d.resultado;
      if(!byPos[key]) byPos[key]=[];
      byPos[key].push(d);

    svg+='<text x="'+(xCut+8)+'" y="'+(H-PB-8)+'" font-size="9" fill="#F87171" opacity="0.6" font-weight="700">🚫 HARD NO</text>';

    // ── bolhas: uma por célula, cor da frente dominante, número dentro ──
    Object.entries(byPos).forEach(([posKey,group])=>{
      const cx=toX(group[0].esf);
      const cy=toY(group[0].resultado);

      const domFid=Object.entries(freqMap).sort((a,b)=>b[1]-a[1])[0][0];
      const hex=FM[domFid]?FM[domFid].hex:'#7A7F96';

      // encodar como JSON para passar ao handler
      const tooltipData=JSON.stringify(listSorted.map(d=>({
        name:d.it.name,
        frente:d.meta.name,
        hex:d.meta.hex,
        esf:d.esforco||'—',
        res:d.resultado,
        done:d.it.done
      }))).replace(/"/g,'&quot;');

      svg+='<circle cx="'+cx+'" cy="'+cy+'" r="'+(r+4)+'" fill="'+hex+'" opacity="0.12"/>';
      svg+='<circle cx="'+cx+'" cy="'+cy+'" r="'+r+'" fill="'+hex+'" opacity="0.88" stroke="#0D1117" stroke-width="1.5"'

        +'/>';
      svg+='<text x="'+cx+'" y="'+(cy+4)+'" text-anchor="middle" font-size="9" font-weight="800" fill="#000" style="pointer-events:none">'+n+'</text>';
    });

    svg+='<text x="'+(PL+cW/2)+'" y="'+(H)+'" text-anchor="middle" font-size="9" fill="var(--muted2)">← Baixo Esforço ———————— Alto Esforço →</text>';
    svg+='<text x="12" y="'+(PT+cH/2)+'" text-anchor="middle" font-size="9" fill="var(--muted2)" transform="rotate(-90 12,'+(PT+cH/2)+')">Resultado</text>';
    svg+='</svg>';

  } else {
    h+=bubbleChart();
  }
  h+='</div>';

  // grade 2×2 + coluna sem dados
  h+='<div style="display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:14px">';
